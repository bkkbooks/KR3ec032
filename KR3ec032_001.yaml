body:
  text: 卷上草部人參職專補氣而肺為主氣之臟故獨入肺經也肺家氣旺則心脾肝腎四臟之氣皆旺故補益之功獨魁群草凡人元氣虛衰譬如令際嚴冬黯然肅殺必陽春布德而後萬物發生人參氣味溫和合天地春生之德故能回元氣於無何有之鄉王海藏云肺寒可服肺熱傷肺猶為近理至王節齋謂參能助火虛勞禁服自斯言一出印定後人眼目遂使畏參如螫而病者亦泥是說甘受苦寒至死不悟良可嘆也獨不聞東垣云人參補元氣生陰血而瀉虛火仲景又云亡血虛家並以人參為主丹溪於陰虛之症必加人參彼三公者誠有見於無陽則陰無以生氣旺則陰血自長也愚謂肺家本經有火右手獨見實脈者不可驟用即不得已用之必須鹹水焙過秋石更良蓋咸能潤下且參畏滷咸故也若夫腎水不足虛火上炎乃刑金之火正當以人參救肺何忌之有元素云人參得升麻補上焦之氣瀉肺中之火得茯苓補下焦之氣瀉腎中之火凡用必去蘆淨蘆能耗氣又能發吐也李言聞曰東垣交泰丸用人參皂莢是惡而不惡也古方療月閉四物湯加人參五靈脂是畏而不畏也痰在胸鬲以人參藜蘆同用而取湧越是激其怒性也是皆精微妙奧非達權者不能知少用則壅滯多用則宣通甘草甘平之品合土之德故獨入脾胃蓋土位居中而能兼乎五行是以可上可下可內可外有和有緩有補有瀉而李時珍以為通入十二經者非也稼穡作甘土之正味故甘草為中宮補劑別錄云下氣治滿甄權云除腹脹滿蓋脾得補則善於健運也若脾土太過者誤服則轉加脹滿故曰脾病人毋多食甘甘能滿中此為土實者言也世俗不辨虛實每見脹滿便禁甘草何不思之甚耶甘草為九土之精故能化百毒和百藥熱藥用之緩其熱寒藥用之緩其寒理中湯用之恐其僭上承氣湯用之恐其速下凡下焦藥中勿用嘔吐家及酒家勿用生用有清火之功炙熟有健脾之力節能理腫毒諸瘡梢可止莖中作痛甘草與甘遂芫花大戟海藻四味相反而胡洽治痰癖十棗湯加甘草乃痰在膈上欲令攻擊以拔病根東垣治結核甘草與海藻同用丹溪治勞瘵芫花與甘草同行故陶弘景謂古方多有相惡相反並不為害非妙達精微者不能也沙參微苦微寒以補陰清肺為用故久咳肺痿右寸數實者頗為相宜但體質清虛性用寬緩非肩弘任重之品也黃耆甘而微溫氣薄味厚入肺而固表虛之汗充膚入腠入脾而托已潰之瘡收口生肌逐五臟惡血去皮膚虛熱原其功能惟主益氣甄權謂其補腎氣為水母也日華謂其止崩帶氣旺則無下陷之憂也靈樞曰衛氣者所以溫分肉充皮膚肥腠理司開闔者也黃耆補衛氣與人參甘草三味為除熱之聖藥脾胃一虛肺氣先絕必用黃耆益衛氣而補三焦丹溪云肥白而多汗者宜與黃耆若黑瘦而形實者服之則多胸滿宜以三拗湯瀉之黃耆同陳皮白蜜能通虛人腸閉補脾肺之功也防風能制黃耆黃耆得防風其功愈大乃相畏而相使也古人制黃耆多用蜜炙予易以酒炙即助其走表又行滯性若補腎及崩帶淋濁藥中皆須鹹水拌炒白朮味甘性溫得中宮沖和之氣故補脾胃之藥更無出其右者土旺則能健運故不能食者食停滯者有痞積者皆用之也土旺則能勝濕故患痰飲者腫滿者濕痹者皆賴之也土旺則清氣善升而精微上奉濁氣善降而糟粕下輸故吐瀉者不可缺也別錄以為利腰臍間血者因脾胃統攝一身之血而腰臍乃其分野以藉其養正之功而瘀血不敢稽留矣張元素謂其生津止渴者濕去而氣得周流而津液生矣謂其消痰者脾無濕則痰自不生也安胎者除胃熱也米泔浸之借穀氣以和脾也壁土炒之竊土氣以助脾也嫌其燥以蜜水炒之嫌其滯以薑汁炒之蒼朮甘而辛烈性溫而燥入脾胃二經發汗而去風寒濕下氣而消痰食水開鬱有神功腫脹為要藥化一切積塊除諸病吐瀉善逐鬼邪能弭災沴寬中發汗其功勝於白朮補中除濕其力不及於白朮大抵卑監之土宜與白朮以培之敦阜之沴宜與蒼朮以平之楊士瀛曰脾精不禁淋濁不止宜與蒼朮以斂脾精精生於穀故也米泔水浸一日去粗皮研芝麻拌蒸三次以制其燥桔梗苦辛氣輕性平入肺經載引諸藥入至高之分為舟楫之劑肺金稱職則清肅下行故能利膈下氣散痞滿治胸脅痛破血結消痰涎理喘咳療肺癰排膿血清上焦熱凡頭目咽喉口鼻諸症一切主之丹溪云痢疾腹痛乃肺經之氣鬱在大腸宜桔梗開之按桔梗之用惟其上入肺經肺為主氣之臟故能使諸氣下降世俗泥為上升之劑不能下行失其用矣凡用桔梗去蘆及浮皮並尖以百合搗爛同浸一日挫碎微焙葳蕤甘平入脾柔潤入腎故能補中益氣逐熱除蒸治一切不足之症用代人參不寒不燥大有殊功朱肱用治風溫亦謂其能去風熱與濕也但性味和平力量寬緩譬之盛德之人而短於才者也水浸半日飯上蒸用知母苦寒氣味俱厚沉而下降為腎經本藥兼能清肺者為其肅清龍雷勿使僭上則手太陰無銷爍之虞也瀉有餘之相火理消渴之煩蒸凡止咳安胎莫非清火之用多服令人泄瀉令人減食此惟實火燔灼者方可暫用若施之於虛損之人如水益深矣蓋苦寒之味行天地肅殺之令非長養萬物者也今世未明斯義誤以為滋陰上劑勞瘵神丹因而夭枉者不可勝數予故特表而出之永為鑑戒凡用須去毛切以咸酒炒如褐色肉蓯蓉味甘咸微溫補腎而不峻故有蓯蓉之號主男子絕陽不興女人絕陰不育益精氣暖腰膝止遺精遺瀝帶下崩中多服令人大便滑潤堅而不腐者佳酒洗去用鎖陽甘溫入腎補陰益精潤燥養筋凡大便燥結腰膝軟弱珍為要藥酒潤焙用天麻甘平為肝家氣分之品主風濕成痹四肢拘攣通血脈強筋骨利舌本疏痰氣為中風家必需之要劑元素云止頭痛理風虛眩暈浸一日夜濕紙裹煨巴戟天辛甘微溫腎經之血分藥也強筋骨起陰痿益精氣止遺泄治小腹痛引陰中療水脹理腳氣酒浸一宿去心焙遠志微溫味苦腎經氣分藥也強志益精治善忘蓋精與志皆腎所藏者精不足則志衰不能上交於心故善忘精足志強則善忘愈矣壯陽固精明目聰耳長肌肉助筋骨理一切癰疽破腎積奔豚主治雖多總不出補腎之功或以為心經藥則未也甘草湯浸宿去心焙仙茅辛溫有毒腎經藥也益陽道暖腰膝強筋骨美顏色腹冷不能食攣痹不能行皆為要藥按仙茅宣而能補頗稱良品但有小毒服以縱欲者自速其生與仙茅何咎忌鐵以糯米泔浸一宿去赤汁陰乾便不損人玄參色黑苦寒腎經藥也清腎家之火解斑疹利咽喉通小便明眼目散瘤癧理傷寒狂邪發渴心內驚煩按玄參主用繁多咸因腎水受傷真陰失守孤陽無根亢而僭逆法當壯水以制陽光常體此意便得玄參之用矣忌銅鐵地榆苦寒微酸肝家藥也善入下焦理血凡腸風下血尿血痢血月經不止帶下崩淋久瀉者皆宜用之寇宗奭云其性寒專主熱痢若虛寒水瀉者勿用地榆雖能止血多用有傷中氣梢能行血即當去之多以生用勿見火丹參苦平色赤心與包絡血分藥也補心血養神志止驚煩消積聚破宿血生新血安生胎落死胎丹參一味有四物之功故胎前產後珍為要劑酒潤微焙紫草味甘氣寒入心包絡及肝經血分藥也治斑疹痘毒涼血活血通大小腸按紫草之用專以涼血為功痘疹毒盛則血熱血熱則干糊而不發越得紫草涼之則血行而毒出世俗未明此旨誤認為宣發之品非矣其性涼潤便閉者乃為相宜若大便利者不可多用嫩而紫色染手指者佳白芨苦寒入肺止嗽家之吐血療諸瘡以生肌蘇恭云手足折裂者嚼塗有效味澀善收頗合秋金之德故入肺止血治瘡生肌凡吐血者以水盆盛之浮者肺血也以羊肺蘸白芨末食之沉者肝血也以羊肝蘸食半沉半浮者心脾之血也羊心脾蘸食微火略焙黃連苦寒入心為治火之主藥瀉心火而除痞滿療痢疾而止腹痛清肝膽而明耳目祛濕熱而理瘡瘍利水道而厚腸胃去心竅之惡血消心積之伏梁大明曰治小兒疳氣殺蟲成無己曰蛔蟲得苦則不動黃連之苦以安蛔也韓𢘅云黃連與官桂同行能使心腎交於頃刻李時珍曰黃連大苦大寒用以降火中病即止安可使肅殺之令常行而伐其生生之氣乎內經曰五味入胃各歸所喜久而增氣物化之常也氣增而久夭之由也王冰注云增味益氣如久服黃連以為清火神劑殊不知黃連瀉實火若虛火而誤投之何異操刃耶愚謂大苦大寒行隆冬肅殺之令譬如聖世不廢刑威雖不得已而後敢用若概施之則暴虐甚而德意窮民不堪命矣喜用寒涼者尚其戒諸黃連止入心家言清肝膽者實則瀉子之法也李時珍云古人香連丸用黃連木香姜連散用乾薑黃連左金丸用黃連吳茱萸口瘡方用黃連細辛皆是一冷一熱寒因熱用熱因寒用陰陽相濟最得制方之妙所以功成而無偏勝也清心火者生用清肝膽火者吳萸拌炒上焦之火宜酒炒下焦之火宜鹹水炒中焦之火宜薑汁炒蓋辛熱能制其苦寒咸潤能制其燥耳胡黃連苦寒入心旁通肝膽產於胡也而性味功用與黃連相類故有是名主五心煩熱勞瘵骨蒸小兒驚疳女人胎蒸傷寒溫瘧消果子積折之塵出如煙者真黃芩苦寒輕飄入肺堅實者入大腸主風熱濕熱痰熱骨蒸火咳下痢喉間腥氣上部積血寒熱往來失血癰疽安胎療淋養陰退陽李時珍云潔古言黃芩瀉肺火治脾濕東垣言片芩治肝火條芩治大腸火丹溪言黃芩治三焦火仲景治少陽症小柴胡湯太陽少陽合病下利黃芩湯少陽症下後心下滿瀉心湯並用之蓋黃芩苦寒去心脾熱一則金不受刑一則胃火不流入肺即所謂救肺也肺虛不宜者苦寒傷土損其母也少陽症雖在半表半裡而胸脅痞滿實兼心肺上焦之邪心煩喜嘔默默不欲飲食又治脾胃中焦之症故用黃芩以治手足少陽相火黃芩亦少陽本經藥也成無己但云柴胡黃芩之苦以發傳經之熱芍藥黃芩之苦以斂腸胃之氣殊昧其治火之功直指云柴胡退熱不及黃芩蓋亦不知柴胡之退熱乃苦以發之散火之標也黃芩之退熱乃寒能勝熱折火之本也仲景云少陽症腹中痛者去黃芩加芍藥心下悸小便不利者去黃芩加茯苓似與別錄治少腹絞痛利小便之文不合成氏言黃芩寒中苦能兼腎故去之是亦不然至此當以意逆之辨以脈症可也若因飲寒受寒腹痛及飲水心下悸小便不利而脈不數者是里無熱症則黃芩不可用也苦熱厥腹痛肺熱而小便不利者黃芩可不用乎子因感冒犯戒蒸熱如火吐痰廢食偏服諸藥益劇偶思東垣治肺熱煩渴晝盛氣分熱也宜一味黃芩湯遂用一兩煎服次日皆愈藥中肯綮效至若此得酒上行得豬膽汁除肝膽火得柴胡除寒熱得芍藥治下利得桑皮瀉肺火得白朮安胎稍挾虛者切勿輕用秦艽味苦性平本入陽明兼通於肝膽主陽明風濕搜肝膽伏風所以養血榮筋除蒸退熱理肢節痛及攣急不遂黃疸酒毒世俗不知其功能本於祛風凡遇痛症動輒用之失其旨矣能利大小便滑泄者勿用柴胡苦而微寒入膽經主傷寒瘧疾寒熱往來嘔吐脅痛口苦耳聾頭角疼痛心下煩熱宜暢氣血除飲食痰水結聚理肩背痛目赤眩暈婦人熱入血室小兒五疳羸熱東垣引清氣升騰而行春令者宜之銀柴胡主用相同勞羸者尤為要藥欲上升者用其根欲下降者用其梢勿令見火前胡味苦微寒肺肝藥也散風祛熱消痰下氣開胃化食止嘔定喘除嗽安胎止小兒夜啼柴胡前胡均為風藥但柴胡主升前胡主降為不同耳種種功力皆是搜風下氣之效肝膽家風痰為患者舍此莫能療忌火防風辛甘微溫入肺與膀胱主上焦風邪瀉肺實大風頭眩周身痹疼四肢攣急風眼冷淚兼能去濕東垣云防風治一身痛乃卑賤之職隨所引而至風藥中潤劑也防風能制黃耆黃耆得防風其功愈大乃相畏而相使也治上焦風用其身治下焦風用其梢本主治風又能治濕者風能勝濕也羌活獨活乃一類兩種中國生者名獨活胡來者名羌活氣味辛溫為手足太陽引經之藥又入足少陰厥陰小無不入大無不通故能散肌表八風之邪利周身骨節之痛頭旋掉眩失音不語手足不隨口眼歪斜目赤膚癢理女子疝瘕散癰疽惡血王好古云羌活色赤氣雄可理遊風獨活色黃氣細可理伏風氣血虛而遍身痛者禁之升麻辛平入脾胃二經主頭額間痛牙根疼爛肌肉間風熱解百毒殺鬼邪闢瘟疫消斑疹行瘀血治陽陷眩暈及胸脅虛痛久瀉脫肛遺濁崩帶東垣云發陽明風邪升胃中清氣引甘溫之藥以補衛入表故元氣不足者用此於陰中升陽又緩帶脈之意大抵人年五十以上降氣常多升氣常少內經曰陰精所奉其人壽陽精所降其人夭千古之下窺其微旨東垣一人而已凡上盛下虛者勿用苦參苦寒入腎主風熱蟲痛腸風下血積熱下利擦牙止痛丹溪云服苦參者多致腰重因其性降而不升也非傷腎也治大風有功況細疹乎火旺者宜之火衰虛弱者大忌白蘚皮氣寒善行味苦性燥入肺脾二經主惡毒諸瘡風癩疹癬濕痹死肌不可屈伸通關節利九竅及血脈肺熱咳嗽天行狂走頭目痛氣味似羊膻多服損中氣玄胡索辛溫入手足太陽厥陰四經行血利血止痛落胎通絡利小便玄胡索兼理氣血故能行血中氣滯氣中血滯理一身上下諸痛確有神靈時珍頌為活血化氣第一品藥非虛語也往往獨行多功雜以他味便緩上部酒炒用中部醋炒用下部鹹水炒用川貝母味苦微寒主煩熱心下滿潤肺消燥痰散項下癭癧傅惡瘡收口生肌俗以半夏有毒用貝母代之不知貝母寒潤治肺家燥痰之藥半夏溫燥治脾胃濕痰之藥二者天淵何可代乎去心同糯米炒米熟為度去米用茅根甘寒入胃主胃熱煩渴吐衄黃疸水腫消瘀血通月閉止喘嘔利小便亦良物也世皆以其微而忽之惟事苦寒致傷中和之氣烏足知此哉龍膽草苦澀大寒肝經邪熱下焦濕熱目病赤腫瘀肉小兒客忤疳氣去腸中小蟲時珍曰相火寄在肝膽有瀉無補故瀉肝膽之熱正益肝膽之氣但大苦大寒過服恐傷胃中生髮之氣及助火邪亦久服黃連反從火化之義也甘草湯浸一宿曬乾用細辛辛溫入足厥陰足少陰血分為手少陰引經之藥主風寒濕頭疼痰厥氣壅利九竅明目聰耳通鼻治齒痛膚癢風眼淚出口瘡喉痹驚癇咳嗽時珍曰氣之厚者能發熱陽中之陽也辛溫能散故風寒濕火痰氣者用之用治口瘡齒疾者取其散浮熱者火鬱則發之之義也辛能瀉肺故咳嗽上氣者宜之辛能補肝故肝膽不足驚癇目疾者宜之辛散太過凡涉虛忌之當歸甘辛微溫入心肝脾三經主一切風一切氣一切血溫中止頭目心腹諸痛破惡血養新血潤腸胃養筋骨澤皮膚理癰疽排膿止痛生肌好古云心生血脾裹血肝藏血故入三經頭止血而上行梢破血而下行身養血而中守全活血而不走氣血昏亂服之而定能領諸血各歸其所當之經故名當歸脾胃瀉者忌之去蘆酒洗微焙川芎味辛性溫肝家藥也主一切風一切氣一切血血虛及腦風頭痛面上遊風目淚多涕昏昏如醉除濕止瀉行氣開鬱去瘀生新調經種子排膿長肉蘇頌云蜜丸夜服治風痰殊效弘景雲止齒中出血東垣云頭痛必用川芎再加引經藥太陽羌活陽明白芷少陽柴胡太陰蒼朮厥陰吳茱萸少陰細辛寇氏云川芎不可久服令人暴亡單服既久則辛喜歸肺肺氣偏勝金來剋木肝必受邪久則偏絕是以暴夭若藥具五味備四氣君臣佐使配合得宜寧有此患哉小者名撫芎專主開鬱蛇床子辛甘入腎溫腎助陽祛風濕癢痹消惡瘡暖婦人子宮起男子陰痿利關節止腰痛蛇床入腎而補元陽大有奇功誰知至賤之中乃伏殊常之品舍此而別求補益豈非貴耳賤目耶去殼取仁略炒藁本苦辛微溫足太陽本經藥也主太陽巔頂痛大寒犯腦痛連齒頰頭面身體皮膚風濕元素云藁本乃太陽風藥其氣雄壯寒熱鬱於本經頭痛必用之藥巔頂痛非此不除與木香同用治霧露之清邪中於上焦與白芷同作面脂既能治風又能治濕亦各其類也白芷辛溫手陽明引經本藥也兼入肺經解利手陽明頭痛中風寒熱及肺經風熱頭面皮膚風痹燥癢眉稜骨痛鼻淵衄齒痛崩帶能蝕膿東垣云白芷療風通用其氣芳香能通九竅表汗不可缺也時珍曰白芷能闢蛇故蛇傷者用之亦制以所畏也微焙用白芍藥味酸微寒為脾肺行經藥入肝脾血分瀉肝安神收胃止瀉實腠理和血脈痢疾腹痛脾虛中滿胎產諸疾退熱除煩明目斂瘡口赤者破血下氣利小便東垣曰芍藥酸澀何以言利小便蓋能益陰滋濕而停津液故小便自行非通利也按芍藥微寒未若芩連梔柏之甚也而寇氏云減芍藥以避中寒丹溪云新產後勿用芍藥恐酸寒以伐生生之氣嗟夫藥之寒者行殺伐之氣違生長之機雖微寒如芍藥猶且諄諄告戒況大苦大寒之劑其可肆行而莫之忌耶避其寒用酒炒入血藥用醋炒牡丹皮苦辛微寒肝經藥也清腎經之虛熱理無汗之骨蒸涼血行血通關腠排膿消瘀定吐衄血時珍云牡丹皮治腎肝血分伏火伏火即相火也古方惟以此治相火故仲景腎氣丸用之後人惟知黃柏治相火不知丹皮更勝也此千古秘奧人所不知赤花者利血白花者補人宜分別用肉厚者佳酒洗微焙木香性溫味辛氣味俱厚沉而下降統理三焦氣分主心腹痛健脾胃消食積止吐利安胎氣理疝氣療腫毒闢鬼邪時珍云諸氣膹郁皆屬於肺故上焦氣滯者宜之乃金鬱則泄之也中氣不運皆屬於脾故中焦氣滯者宜之脾胃喜芳香也大腸氣滯則後重膀胱氣不化則癃淋肝氣逆上則為痛故下焦氣滯者宜之乃塞者通之也形如枯骨味苦黏牙者良凡入理氣藥只生用之若欲實大腸藥須以麵裹煨面熟為度高良薑辛溫獨入脾胃主寒邪腹痛止嘔吐寬噎膈破冷癖除瘴瘧消宿食東壁上炒用草豆蔻辛溫入脾胃二經脾胃多寒濕鬱滯者與之相宜然多用能助脾熱傷肺損目麵裹煨去皮白豆蔻辛溫入肺脾二經散肺中滯氣祛胃中停積退目中雲翳通噎膈除瘧疾解酒毒止吐逆楊士瀛云治脾虛瘧疾能消能磨流行三焦營衛一轉諸症自平肘後方云患噁心者惟嚼白豆蔻最佳其功全在芳香力氣一經火炒便減功力即入湯液但當研細待諸藥煎好乘沸點服尤妙縮砂仁辛溫入肺脾胃腎四經和中行氣消食醒酒止痛安胎除上焦浮熱化銅鐵骨哽同熟地茯苓能納氣歸腎同檀香白蔻能下氣安肺得白朮陳皮能和氣益脾炒香去衣益智仁辛溫能達心與脾胃進飲食攝涎唾止遺泄及小便多止女人崩漏亦能安養心神直指云心者脾之母進食不止於和脾蓋火能生上故古人進食必先益智上中益火也去殼鹹水肉果辛溫善入手足陽明暖脾胃固大腸消宿食寬膨脹止吐逆按土性喜暖愛香故肉果與脾胃最為相宜其能下氣者脾得補而健運非若厚朴枳實之偏於峻削也糯米粉裹煻火中煨熟去粉用忌鐵器補骨脂辛溫宜腎興陽事止腎泄暖丹田斂精神腰膝痠疼腎冷精流者不可缺也韓飛霞雲補骨脂屬火收斂神明能使心包之火與命門之火相通故元陽堅固骨髓充實本事方云腎氣衰弱則陽事痿劣不能熏蒸脾胃令人痞滿少食譬如釜中無火雖終日不熟何能消化補骨脂助火固能生土更加木香以順氣使之斡旋倉廩倉稟空虛則受物矣揉去皮以胡桃肉拌炒或鹹水炒薑黃苦溫善達肝脾下氣破血化癥瘕血塊消癰腫大者為片子黃能入臂理痛鬱金辛苦入心下氣破血止心腹痛產後敗血攻心失心顛狂衄血吐血痘毒入心經驗方云一婦人患顛十年用鬱金七兩明礬三兩為末薄荷湯法丸才服五十丸心胸間覺有物脫去再眼而蘇此因驚憂而致痰與血凝於心竅也蓬莪朮苦辛而溫專走肝家破積聚惡血疏痰食作痛李時珍云鬱金入心專司血病薑黃入脾治血中之氣蓬朮入肝治氣中之血稍有不同醋炒者引入血分荊三稜苦溫肝家血分藥也破堅積結聚行瘀血宿食治瘡腫堅硬通經下乳墮胎昔有患癥癖者死遺言必開腹取之得塊堅如石文理有五色削為刀柄後劉三稜柄消成水故知得療癥瘕元素云能瀉真氣虛者勿用醋煮炒乾香附辛甘微苦足厥陰手少陽藥也利三焦開六郁消痰食散風寒行血氣止諸痛月候不調崩漏胎產多怒多憂者需為要藥丹溪云香附行中有補如天之所以為天者健運不息故生生無窮即此理也李時珍云生則上行胸膈外達皮毛熟則下走肝腎外徹腰足炒黑則止血便制則入血補虛咸炒入血潤燥酒炒則行經絡醋炒則消積聚薑汁炒則化痰得參術則補氣得歸地則補血得蒼朮撫芎則解鬱得黃連山梔則降火得紫蘇則發散得艾葉則暖子宮韓飛霞雲香附能推陳致新故諸書皆云益氣而俗有耗氣之說宜於女人不宜於男子者非矣藿香辛溫脾肺之藥也開胃進食溫中快氣止心腹痛為吐逆要劑東垣謂其芳香助胃故能止嘔進食今市中售者殊欠芳香安望其有功耶凡使須水洗淨澤蘭苦而微溫肝脾藥也破瘀血消癖癥宣九竅利關節通小腸治水腫塗癰疽按澤蘭芳香悅脾可以快氣疏利悅肝可以行血流行營衛暢達膚竅遂為女科上劑香薷辛溫入肺發散暑邪通利小便定霍亂散水腫世醫治暑概用香薷殊不知香薷為辛溫發散之劑如納涼飲冷陽氣為陰邪所遏以致惡寒發熱頭痛煩渴或霍亂吐瀉者與之相宜若勞役傷暑汗多煩喘必用清暑益氣湯如大熱大渴人參白虎湯以瀉火益元若用香薷是重虛其表反助其熱矣今人不知暑傷元氣概用香薷代茶不亦誤乎外臺秘要香薷一斤熬膏加白朮末七兩丸如桐子米飲下治通身水腫頗著神功忌火焙並忌日曬荊芥辛溫入肺肝二經散風熱清頭目利咽喉消瘡毒化瘰癧破結聚下瘀血按荊芥本功治風又兼治血者為其入風木之臟即是藏血之地故並主之與河豚黃顙魚驢肉相反若同日食之多致喪命不可不痛戒也荊芥穗炒黑治下焦血有功薄荷辛涼肺肝藥也除風熱清頭目利咽喉止痰嗽去舌苔洗癮疹瘡疥瘰癧塗蜂螫蛇傷塞鼻止衄血擦舌療蹇澀按薄荷氣味俱薄浮而上升故能清理高巔解散風熱然芳香尖利多服久服令人虛汗不止軟弱人久用反動消渴病紫蘇辛溫肺家藥也葉可發散風寒梗能行氣安胎子可消痰定喘解魚蟹毒治蛇犬傷按紫蘇以辛散為功久服泄人真氣俗世喜其芳香愛其達氣或為小蔬或作蜜餞朝暮服之甚無益也古人云芳草致豪貴之疾蓋指此類耳甘菊花味甘性平入肺腎兩經清頭目風熱定風虛眩暈利血脈安腸胃悅皮膚止腰疼翳膜遮睛冷淚流溢珍為要品菊花屬金與水惟其益金故肝木得乎而風自息惟其補水故心火有制而熱自除甘美和平得天地清純沖和之氣是以服食家重之如寶玉也鍾會贊菊有五美云圓花高懸准天極也純黃不雜合土色也早植晚發君子德也冒霜吐英象真質也味和體輕神仙食也甘者功用弘多苦者但可理癰白者入氣赤者入血神而明之存乎其人耳忌火去蒂漿過曬乾乘燥入磨艾葉辛苦而溫通行十二經溫中氣祛寒濕定吐衄止下利安胎氣除腹痛理崩帶闢鬼邪殺諸蟲灼灸百病大有奇功艾性溫暖有徹上徹下之功服之以祛寒濕可轉肅殺為陽和灸之以通經絡可起沉疴為康泰其用最普其功最巨蘇頌訛云不可妄服此必燥熱者久服故耳今人謬執斯言沒其神用何異於因噎而廢食耶老弱虛人下元畏冷以熟艾兜其臍腹妙不可言生用則涼熟用則熱茵陳蒿足太陽藥也治發黃驅濕熱利小便通關節按發黃有陰陽二症茵陳同梔子黃柏以治陽黃同附子乾薑以治陰黃總之茵陳為君隨佐使之寒熱而理黃症之陰陽也古法用茵陳生薑搗爛於胸前四肢日日擦之青蒿苦寒入肝經血分主真陰不足伏熱骨蒸生搗傅金瘡止血止痛殺鬼氣屍疰理久瘧久痢按青蒿得春獨早其發生在群草之先故治少陽厥陰諸症特著其功然性頗陰寒胃虛者不敢投也童便浸一日夜曬乾茺蔚即益母草心肝二經血分藥也活血破血調經止痛下水消腫胎前產後一切諸症皆不可缺可浴癮疹搗傅蛇毒茺蔚子功用略同但葉則專主行血子則行中有補故廣嗣及明目藥中多收之然畢竟職專行血故瞳神散大者又在禁例微炒舂去殼用夏枯草苦辛微寒獨入厥陰消瘰癧散結氣止目珠痛此草補養厥陰血脈又能疏通結氣目痛瘰癧皆系肝症故獨建神功然久用亦防傷胃與參術同行乃可久服無弊旋覆花鹹甘微溫入肺與大腸二經通血脈消結痰驅痞堅除水腫散風濕開胃氣止嘔逆旋覆花之功頗多然不越乎通血下氣行水而已但是走散之品非虛衰者所宜也去蒂及皮蒸用紅花辛溫入心與肝血分藥也活血通經去瘀散腫產後血運胎死腹中並宜用之多用破血少用養血酒噴微焙大小薊根甘溫入脾肝二經破宿血生新血安貽氣止崩漏定吐衄大小薊皆能破血但大薊力勝能消癰小薊力微只可退熱不能消癰酒洗或童便拌微炒續斷苦而微溫獨入肝家助血氣續筋骨破瘀結消腫毒縮小便止遺泄理胎產崩帶及跌撲損傷血痢用平胃散五錢入續斷一錢二分煎湯服必效以其既能行血又能止血宣中有補也酒浸炒胡蘆巴苦溫純陽之品補火之藥也主元藏虛寒疝瘕寒溫腹脅脹滿腳氣胡蘆巴乃海南山中所產蘿蔔子也溫補下元導火歸經與肉桂同功至宋時始出故圖經本草未之及耳酒浸炒牛蒡子即鼠黏子辛溫入肺達肺氣利咽喉去皮膚風消斑疹毒出癰疽頭牛蒡子本入肺理風之劑兼理腰膝凝滯者一則金為水母一則清肅下輸或謂兼入腎者非其升浮之用也豨薟苦寒入肝主風氣麻痹胃痛膝弱風濕諸瘡按豨薟苦寒之品且有毒令人吐以為生寒熟溫理或有之以為生瀉熟補未敢盡信豈有苦寒搜風之劑一經蒸煮便有補益之功耶世俗以慎微本草譽之太過遂誤認為風家至寶余少時亦信之及恪誠修事久用無功始知方書未可盡憑也古人所謂補者亦以邪氣去則正氣昌非謂其本性能補耳酒蜜潤蒸蘆根甘寒入胃主胃熱火逆嘔吐噎噦消渴瀉痢取肥者去須節並赤黃皮麻黃辛甘而溫氣味俱薄輕清上浮入手太陰足太陽二經去營中寒邪泄衛中風熱通利九竅宣達皮毛消斑毒破徵結止咳逆散腫脹按麻黃輕可去實為發表第一藥惟當冬令在表真有寒邪者始為相宜雖發熱惡寒苟不頭疼身痛拘急脈不浮緊者不可用也雖可汗之症亦當察病之重輕人之虛實不得多服蓋汗乃心之液若不可汗而誤汗雖可汗而過汗則心血為之動搖或亡陽或血溢而成壞症可不兢兢至謹哉服麻黃須謹避風寒不爾復發難療去根節煮數沸掠去上沫不去沫令人煩根節能止汗故也木賊甘苦入肝退目翳止淚出木賊與麻黃同形同性亦能發汗散火治木器者用之搓擦則光淨故有木賊之名取以制肝木有靈也燈心平淡入太陽經利小便除水腫燒灰吹急喉痹傅陰疳神效生地甘寒入心腎兩經滋腎水養真陰填骨髓長肌肉利耳目破惡血理折傷解煩熱除脾傷痿倦去胃中宿食清掌中熱癰潤皮膚索澤療吐血衄血尿血便血胎前產後崩中帶下熟地甘溫功用尤弘勞傷胎產家推為上劑脈洪實者宜於生地脈虛軟者宜於熟地六味丸以之為首天一所生之源也四物湯以之為君乙癸同歸之治也生地性寒胃虛者恐其妨食宜醇酒炒之以制其寒熟地性滯痰多者恐其泥膈宜薑汁炒之以制其滯更須佐以砂仁沉香二味皆納氣歸腎又能疏地黃之滯此用藥之權衡也揀肥大沉水者好酒同砂仁末拌勻入柳木甑於瓦鍋內蒸極透曬乾九次為度地黃稟北方純陰之性非太陽與烈火交相為制則不熟也市中惟用酒者不知其不熟也向使一煮便熟何固本膏用生熟地各半耶忌銅鐵器否則令人腎消發白牛膝苦酸腎肝藥也補腎強陰理腰脊膝脛之病補肝強筋療血結拘攣之苦止淋家莖痛欲死截久瘧寒熱不休能落死貽出竹木刺按五淋諸症極難見效惟牛膝一兩入乳香少許煎服連進數劑即安性主下行且能滑竅夢失遺精者在所當禁此千古秘奧也欲下行則生用滋補則酒炒紫菀辛甘微溫肺家藥也益肺調中消痰定喘止血療咳解渴潤肌補虛闢鬼紫菀辛而不燥潤而不寒補而不滯誠哉金玉君子然非獨用多用不能速效小便不通及溺血者服一兩立效去須洗淨微火焙麥門冬甘而微寒肺經藥也清肺中伏火定心臟驚煩理勞瘵骨蒸止血熱妄行理經枯乳閉療肺痿吐膿潤燥干煩渴麥門冬主用煩多要不越清肺之功夏令濕熱人病困倦無力身重氣短孫真人立生脈散補天元真氣人參甘溫瀉虛火而益元氣麥冬甘寒潤燥金而清水源五味子之酸溫瀉丙丁而補庚金殊有妙用然胃寒者不敢餌也去心用若入丸劑湯潤搗膏畏其寒者好酒浸搗冬葵子甘寒太陽藥也達諸竅疏大腸利小便催難產通乳閉出癰疽頭下丹石毒葵根功用與子相仿小兒誤吞銅錢以根煮汁飲之神效葵性淡滑為陽能利竅通閉關格者恆用之別有一種蜀葵根腸胃生癰者同白芷服善能排膿散毒款冬花辛而微溫肺經藥也潤肺消痰止咳定喘清喉痹理肺痿肺癰古人治久咳款冬花一兩蜂蜜拌潤入茶壺中以面固其蓋勿令漏氣壺下著炭火待煙從壺口出口含吸咽煙盡乃止數日必效按傅咸款冬花賦云冰凌盈谷雪積被崖顧見款冬煒然華豔則其純陽之性可知雖具辛溫卻不燥熱故能輕揚上達至高之府贊相傅而奏功勳也蜜水拌焙決明子苦寒東方藥也清肝家風熱去目中翳膜理赤眼淚出炒熟研碎瞿麥苦寒入太陽經逐膀胱邪熱治小便不通明目墮胎按瞿麥之用惟破血利竅四字可以盡其功能非久任之品也炒用葶藶子辛寒入肺瀉氣主肺壅上氣咳嗽喘促痰氣結聚通身水氣按本草十劑云泄可去閉葶藶大黃之屬此二味皆大苦大寒大黃泄血閉葶藶泄氣閉夫葶藶之峻利不減大黃性急逐水殊動真氣稍涉虛者宜痛戒之有甜苦二種苦者專泄甜者稍緩然肺家水氣非此莫能療但不敢多用耳酒炒或同糯米炒米熟去米用車前子甘寒入腎膀胱二經利小便除濕痹益精氣療目赤催產難車前子利小便而不走氣與茯苓同功以紗囊揉去泥土炒熟連翹苦寒入心瀉心火破血結散氣聚消腫毒利小便諸瘡痛癢皆屬心火連翹瀉心遂為瘡家要藥治癭癧瘡瘍有神然久服有寒中之患酒炒研用青黛甘寒東方藥也瀉肝氣散鬱火殺疳蟲傅熱瘡古稱青黛從波斯國來今惟以靛花充用然干靛多夾灰石須淘澄去淨取浮標用萹蓄苦寒利小便驅濕熱殺諸蟲沙菀蒺藜甘溫善走腎肝二經主補腎益精止腰痛遺泄種玉方中尊為要品白蒺藜別為一種破血消痰治風明目亦能補腎穀精草甘平陽明藥也主頭風翳膜痘後目翳此草收谷後荒田中生之得谷之餘氣獨行陽明分野明目退翳之功而在菊花之上海金沙甘寒小腸膀胱藥也主濕熱腫滿通小便淋秘此太陽經血分之藥惟在二經血分熱者始為相宜勿令見火大黃苦寒足太陰手足陽明手足厥陰五經血分之藥也行瘀血導血閉通痢積破結聚消飲食清實熱瀉痞滿潤燥結敷腫毒盪滌腸胃推陳致新大黃性極猛烈故有將軍之號本血分之藥若在氣分用之未免誅伐太過矣瀉心湯治心氣不足而邪火有餘也雖曰瀉心實瀉血中伏火也又仲景治心下痞滿用大黃黃連瀉心湯此亦瀉脾胃之濕熱非瀉心也病發於陰而反下之則為痞滿乃寒傷營血邪氣乘虛結於上焦故曰瀉心實瀉脾也病發於陽而反之下則為結胸乃熱邪陷入血分亦在上焦大陷胸湯丸皆用大黃亦瀉脾胃血分之邪也若結胸在氣分只用小陷胸湯痞滿在氣分者只用半夏瀉心湯成無己不知其分別此義凡病在氣分胃虛血虛胎前產後並勿輕用其性苦寒能傷氣耗血也欲下行者必生用之若邪在上者必須酒服引上至高祛熱而下也欲取通利者須與穀氣相遠下後亦不得驟進穀氣大黃得穀氣便不能通利耳商陸根酸辛有毒通大小腸疏泄水腫攻消痃癖搗敷腫毒喉痹小兒痘毒同蔥白填臍白者可入湯散赤者但堪外貼古贊云其味酸辛其形類人其用療水其效如神與大戟甘遂異性而同功虛者不可用止用貼臍利小便即腫消也大戟苦寒有毒入肝與膀胱利大小便泄十種水病破惡血癖塊李時珍云痰涎無處不到入心則迷竅而顛狂入肺則塞竅而咳喘入肝則脅痛乾嘔入經絡則痹痛入筋骨則引痛並用控涎丹殊有奇功此治痰之本本者水濕也得氣與火變為痰涎大戟泄臟腑之水濕甘遂行經隧之水濕白芥子散皮膚膜外之痰善用者收奇功也錢仲陽曰腎為真水有補無瀉又云痘瘡變黑歸腎用百祥丸以瀉腎非瀉腎也瀉其腑則臟自不實百祥丸惟大戟一味大戟能行水瀉膀胱之府則腎臟不實竊謂百祥非獨瀉腑乃實則瀉其子也腎邪實而瀉肝也大戟浸水色青肝膽之色也仲景治痞滿脅痛乾嘔短氣十棗湯主之亦有大戟夫乾嘔脅痛非膽症乎則百祥之瀉肝膽明矣何獨瀉腑乎用棗同煮軟去骨曬乾甘遂苦寒有毒濱決十二經疏通水道攻堅破結張元素云味苦氣寒直達水氣所結之處水結胸中非此不除故大陷胸湯用之但有毒不可輕用劉河間云水腫未消以甘遂末塗腹繞臍內服甘草水其腫便去又塗腫毒濃煎甘草湯服其毒即散赤皮者佳白皮者性劣也麵裹煨熟用以去其毒續隨子辛溫有毒破瘀血癥癖蠱毒鬼疰水腫利大小腸下水甚捷有毒傷人不得過用服後瀉多以醋同粥食即止去殼取色白者研爛紙包壓去油取霜用蓖麻子辛熱有毒服者一生勿食炒豆犯即脹死且有毒損人故不可輕服但取外治其用甚多研傅瘡癰瘰癧塗足心催生口眼歪斜左歪貼右右歪貼左塞鼻治壅塞耳治聾小便不通三粒研細入紙捻插莖即通子宮脫下塗頂即收丹溪云追膿拔毒乃外科要藥又曰鵜鵝油能引藥氣入內蓖麻油能拔病氣出外偏風手足不舉同羊脂麝香山甲煎作膏日摩數次手臂腫痛萆麻搗膏貼之一日即愈偏頭痛同乳香搗塗即止外用必奏奇內服多致損人取萆麻油法研爛入水用火煮之有沫撇起沫盡乃止取沫煎至滴水成珠為度常山苦寒有小毒消痰至捷截瘧如神常山劫痰療瘧無他藥可比須在發散表邪之後用之得宜立建神功世俗聞雷斅有老人久病之戒遂視常山為峻劑殊不知常山發吐惟生用與多用為然為甘草同行則亦必吐若酒浸炒透但用錢許余每用必建奇功未有見其或吐者也不一表明將使良藥見疑沉疴難起抑何其愚耶酒浸一宿切薄片慢炙久炒形如雞骨者良附子辛熱有毒通十二經無所不至暖脾胃而驅寒濕補命門而救陽虛除心腹腰膝冷疼破癥堅積聚血瘕治傷寒陰症厥逆理虛人隔噎脹滿主督脈脊強而厥救疝家引痛欲絕斂癰疽久潰不收拯小兒脾弱慢驚附子稟雄壯之性有斬關之能引補氣藥以追散失之元陽引補血藥以滋不足之真陰引發散藥以逐在表風寒引溫暖藥以祛在裡之寒濕其用弘矣張元素云附子以白朮為佐乃除寒濕之聖藥又益火之原以消陰翳則便溺有節丹溪云氣虛熱甚者少加附子以行參耆之功肥大多濕者亦宜之戴元禮云附子無干姜不熱得甘草則性緩李時珍云陰寒在下虛陽上浮治之以寒則陰氣益甚治之以熱則拒而不納熱藥冷飲下咽之後冷體既消熱性便發病氣隨愈此熱因寒用之法也予每遇大虛之候參術無用必加附子便得神充食進若陰虛陽旺形瘦脈數者不可輕投附子以蹲坐正節角少重一兩者佳形不正而傷缺風皺者不堪用也沸湯泡少頃去皮臍切作四分用甘草濃汁二鍾慢火煮之汁干為度隔紙烘乾或用便制者只宜速用不堪藏也毋為烏頭附烏頭而生者為附子身長者為天雄大抵風症用烏頭寒症用附子而天雄之用與附子相仿但功力略遜耳按烏附天雄皆是補下之藥若繫上焦陽虛當用參耆不當用天雄也且烏附天雄之尖皆是向下生者其氣下行其臍乃向上生苗之處寇氏謂天雄之性不肯就下元素謂天雄之性補上焦陽虛皆為誤見天南星苦辛有毒脾肺肝之藥也主風痰麻痹眩運口噤身強筋脈拘緩口眼腫邪堅積癰疽利水去濕散血墮胎味辛而散故能治風散血氣溫而燥故能勝濕除涎性緊而毒故能攻堅拔毒凡諸風口噤需為要藥重一兩者佳生用以溫湯洗過礬湯浸三日夜日日換水曬乾熟用者酒浸一宿入甑蒸一日以不麻舌為度造膽星法南星生研末臘月取黃牛膽汁和劑納膽中懸有風處年久彌佳半夏辛溫有毒脾胃藥也燥濕和中消痰止嗽開胃健脾止嘔定吐消癰墮胎好古曰經云腎主五液化為五濕自入為唾入肝為泣入心為汗入脾為痰入肺為涕有痰曰嗽無痰曰咳痰因咳動脾之濕也半夏能泄痰之標不能泄痰之本泄本者泄腎也咳無形而痰有形潤腎燥脾無形則潤有形則燥所以為流濕潤燥耳以半夏為肺藥非矣止吐為足陽明除痰為足太陰也汪機曰脾胃濕熱涎化為痰自非半夏曷可治乎若以貝母代之則翹首待斃時珍曰脾無濕不生痰故脾為生痰之源肺為貯痰之器半夏治痰為其體辛溫也涎滑能潤故行濕而通大便利竅而泄小便所謂辛走氣能化液辛以潤之是矣丹溪謂半夏能使大便潤而小便長成無己謂半夏行水氣而潤燥局方半硫丸治老人虛秘皆取其滑盛也俗以半夏為燥誤矣濕去則土燥則痰涎不生非其性燥也惟陰虛勞損非濕熱之邪而用之是重竭其津液醫之咎也豈藥之罪哉愚謂同蒼朮茯苓則治濕痰同栝樓黃芩則治熱痰同南星前胡則治風痰用芥子薑汁則治寒痰惟治燥痰但宜以貝母栝樓非半夏所司也半夏主治頗多總是去濕健脾之力苟無濕症與半夏不相蒙也古人半夏有三禁謂汗家渴家血家以其行濕利竅耳擇大而白者水浸七日每日換水去衣淨更以薑汁明礬皂角同煮透曬乾造麴法以半夏洗淨去衣研細以薑汁礬湯搜和作餅楮葉包裹待生黃衣去葉曬乾芫花辛溫有毒消痰飲水腫濕痹咳逆上氣喉鳴咽腫疝瘕癰毒李時珍曰仲景治太陽表不解心下有水氣乾嘔發而咳或喘或利者小青龍湯表已解頭痛出汗惡寒心下有水氣痛引兩脅或喘或咳者十棗湯小青龍發散表邪使水氣自毛竅出開鬼門也十棗湯祛逐里邪使水氣自二便出潔淨府也飲症有五皆因內啜水漿外感濕氣鬱而為飲流於肺則為支飲令人喘咳寒熱吐沫背寒流於脾則為懸飲令人咳唾痛引缺盆及兩脅流於心下則為伏飲令人胸滿嘔吐寒熱眩暈流於腸胃則為痰飲令人腹鳴吐水胸脅支滿或泄瀉忽肥忽瘦流於經絡則為溢飲令人沉重注痛或作水腫芫花大戟甘遂之性逐水去濕直達水飲窠囊之處取效甚捷多即損人陳久者良醋煮數沸去醋更以水浸一宿曬乾則毒去也菟絲子甘平腎家藥也益精髓堅筋骨止遺泄主溺有餘瀝去腰膝痠軟菟絲子稟中和之氣凝正陽之性不燥不寒故多功於北方為固精首劑水淘淨去土水酒浸一宿焙乾五味子肉中酸甘核中苦辛咸故名五味入肺腎二經滋腎家不足之水收肺氣耗散之金強陰固精止渴止瀉定喘除嗽斂汗明目東垣云五味子收肺氣乃火熱必用之藥故治嗽以之為君但有外邪者不可驟用丹溪云五味收肺非除熱乎補腎非暖水臟乎乃熱嗽必用之品食之多虛熱者收補之驟也黃昏嗽乃火浮入肺不宜涼藥宜五味子斂而降之元素云夏月困乏無氣以動與黃耆人參麥門冬五味子少加黃連煎服使人精神頓加兩足筋力湧出補用熟嗽用生覆盆子甘平入腎起陽治痿固精攝溺強腎而無燥濕之偏固精而無凝澀之害金玉之品也酒浸一宿焙用馬兜鈴苦寒入肺清肺氣止咳嗽定喘促體輕而虛與肺同象故專司喘嗽以清熱降氣為功不能補益也使君子使君子甘溫入脾殺蟲退熱健脾止瀉殺蟲之藥多是苦辛此獨味甘亦可異矣且能扶助脾胃收斂虛熱為小兒要藥牽牛子辛溫入肺及大小腸利小便通大腸消水腫逐痰飲除氣分濕熱疏三焦壅結牽牛主脾家水氣喘滿腫脹下焦郁遏腰背脹腫及大腸風秘卓有殊功但病在血分及脾虛痞滿者不可服也李時珍治一人腸結服養血潤燥藥則泥膈不快服硝黃利藥則若罔知其人形肥膏粱多郁日吐酸痰乃寬此三焦氣滯有升無降津液皆化而為痰不能下滋腸胃非血燥也潤劑多滯硝黃入血不能入氣故無效也牽牛為皂角膏丸才服便通一人素多酒色二便不通下極脹痛用利藥不效是濕熱之氣壅塞清道病在二陰之間故前阻小便後阻大便病不在大腸膀胱也用川楝茴香山甲倍用牽牛煎服而愈碾取頭末去皮面用亦用半生半熟用者皮能滯氣勿誤用天花粉甘苦微寒主內熱乾渴痰凝咳嗽煩滿身黃消毒通經苦能降火甘不傷胃故本經有安中補虛之稱虛熱燥渴者與之相宜且清和疏利又能消毒通經然毒竟行秋冬之令非所以生萬物者也去皮切片水浸三日逐日換水搗如泥絹濾澄粉薄荷襯蒸曬乾實名瓜蔞主胸痹腫毒潤肺止咳滌痰止渴丹溪頌其洗滌胸垢為治渴神藥其子功用約略相同研爛去油葛根辛甘陽明經藥也主頭額痛解肌止渴宣斑發痘消毒解醒元素曰升陽生津脾虛作渴者非此不除不可多用恐傷胃氣仲景治太陽陽明合病桂枝湯內加麻黃葛根又有葛根黃連解肌湯用以斷太陽入陽明之路非太陽藥也葛根蔥白湯為陽明頭痛仙藥若太陽初病未入陽明而頭痛者不可使用升麻葛根反引邪入陽明矣丹溪曰癍疹已見紅點不宜用葛根升麻湯恐表虛反增斑爛也東垣曰乾葛輕浮鼓舞胃氣上行生津解肌熱治脾胃虛瀉聖藥也本草十劑云輕可去實麻黃乾葛之後益麻黃乃太陽經藥兼入肺經肺主皮毛葛根乃陽明經藥兼入脾經脾主肌肉二藥均是輕揚發散而所入迥然不同也天門冬甘苦而寒肺與腎之藥也主肺熱咳逆喘促肺痿肺癰吐血衄血乾渴痰結通腎益精天門冬涼而能補肺家虛熱者宜之然虛盛者須與參耆同進不致傷胃時珍云天門冬清金降火益水之上源故能下通腎氣若服之日久必病滑腸反成痼疾矣去心用百部苦甘微溫主咳嗽喘逆殺傳屍寸白蛔蟯疥癬蠅蠓蝨一切諸蟲時珍云亦麥門冬之類皆主肺疾但百部氣溫寒者宜之門冬性冷熱者宜之此為異耳何首烏苦澀微溫腎肝藥也補血氣強筋骨益精髓黑鬚發斂虛汗固遺濁止帶崩理癰疒栗療腸風悅顏色久服令人有子肝主疏泄腎主閉藏苦以堅養腎陰澀以收攝肝氣不燥不寒功在地黃麥冬之上為滋補良藥白者入氣赤者入血赤白合用氣血交培一老人見有藤二株至夜相交掘其根歸為末酒服發烏顏少連生數男此老姓何故名何首烏真神物也忌鐵竹刀刮去皮米泔浸半日切片每赤白各一斤用黑豆三斗每次用三升合以水浸過以甑內先鋪豆一層首烏一層重重鋪完砂鍋上蒸之豆熟為度去豆曬乾九次乃佳萆薢苦平胃與肝藥也搜風去濕補腎強筋主白濁莖中痛陰痿失溺惡瘡入肝搜風故能理風與筋之病入胃去濕故能理濁與瘡之病古人或稱其攝溺之功或稱其逐水之效何兩說相懸耶不知閉蟄封藏之本在腎腎氣強旺則收攝而妄水亦無容藏之地且善清胃家濕熱故能去濁分清也楊氏萆薢分清飲正和此意楊子建云小便頻數無度莖中痛者必大腑不通水液只就小腸大腑愈加燥竭甚則燥熱或因酒色或因過食辛熱葷膩則腐物瘀血之類隨虛入於小腸故也此乃小便頻數而痛與淋症澀痛者不同用萆薢一兩鹹水炒為末煎服使水道轉入大腸仍以蔥湯頻洗穀道令氣得通則小便數及痛自減也萆薢與土茯苓形雖不同主用相仿豈一類數種乎鹽水拌炒用土茯苓甘平入胃肝二經健脾胃清濕熱利關節治拘攣止泄瀉除骨痛主楊梅瘡毒解汞粉毒時珍云楊梅瘡古無病者近起於嶺表風土卑炎嵐瘴熏蒸挾淫穢濕熱之邪發為此瘡互相傳染遍及海宇類有數種治病則同也症屬厥陰陽明二經如兼少陰太陰則發於咽喉兼太陽少陽則發於頭耳蓋相火寄於厥陰肌肉屬於陽明故也用輕粉銀硃劫劑七日即愈水銀性走而不守加以鹽礬升為輕粉銀硃其性燥烈善攻痰涎涎乃脾液此物入胃歸陽明故涎被劫隨火上升從喉頰齒縫而出瘡即干愈但毒氣竄入經絡筋骨莫之能出變為筋骨攣痛發為癰毒遂成廢痼土茯苓能健脾去風濕脾健而風濕去故毒得以愈近有秘方土茯苓一面苡仁防風金銀花木瓜木通白蘚皮各五分皂莢子四分人參當歸各七分日飲三服惟忌啜茶及牛羊雞鵝魚肉燒酒發麵房勞色白者佳威靈仙辛鹽入太陽經搜逐諸風宣通五臟消痰水破堅積丹溪曰威靈仙痛風之仙藥也其性好走通十二經朝服暮效辛能散邪故主諸風鹽能泄水故主諸濕壯實誠有殊功氣弱者反成痼疾茜草苦溫厥陰藥也行血滯通經脈理痛風除寒濕活血與紅花同功而性更通利忌鐵防己辛寒太陽藥也主下焦風濕腫痛膀胱畜熱通九竅散癰毒利二便東垣云防己苦寒瀉血中濕熱通其滯塞此瞑眩之藥下咽令人身心煩亂飲食減少至於濕熱壅塞下注腳氣無他藥可代若勞倦虛熱以防己泄大便則重亡其血不可用一也渴在上焦氣分而防己乃下焦血藥不可用二也外感邪傳肺經氣分濕熱而小便黃赤此上焦氣分禁與血藥不可用三也大抵上焦濕熱皆不可用下焦濕熱審而用之防己為療風水要藥治風用木防己治水用漢防己去皮酒洗曬乾木通甘淡微寒心胞絡小腸膀胱藥也利小便消水腫宣血脈通關節明耳目治鼻塞破積聚除煩渴安心神散癰腫清伏熱醒多睡去三蟲墮胎下乳東垣曰木通甘淡助西方秋氣下降以利小便專瀉氣滯也肺受熱邪氣化之源絕則寒水斷流膀胱癃閉宜此治之時珍曰木通上能通心清肺理頭痛達九竅下能泄濕祛熱皆從小便而出本草云通可去滯木通防己之屬夫防己苦寒瀉血分濕熱木通甘淡瀉氣分濕熱細而白者佳通草淡平肺與膀胱藥也利水通淋明目退熱下乳催生色白氣寒味淡體輕故入肺經導熱使降由膀胱下泄也鉤藤甘苦微寒手足厥陰藥也主小兒寒熱驚癇夜啼瘛瘲客忤胎風內釣腹痛大人肝風目眩金銀花甘而微寒主脹滿下利消癰散毒補虛療風世人但知其消毒之功昧其脹利風虛之用余於諸症中用之屢屢見效奈何忽之耶澤瀉甘鹽微寒腎與膀胱藥也利水道通小便補虛損理腳氣按本經云久服明目而扁鵲云多服病眼何相反耶蓋水道利則邪火不幹空竅故云明目水道過於利則腎氣虛故云病眼又別錄稱其止遺泄而寇氏謂泄精者不敢用抑何相刺謬也蓋相火妄動而遺泄者得澤瀉清之而精自藏氣虛下陷而精滑者得澤瀉降之而精愈滑矣況滑竅之劑腎虛失閉藏之職亦一禁夫一藥也一症也而或禁或取變化殊途自非博洽而神明者未免對症而疑臨症而眩若格於理者變變化化而不離乎宗故曰醫不執方合宜而用斯言至矣菖蒲辛溫心肝藥也開心竅消伏梁除痰嗽通九竅明耳目出音聲散風濕止心痛殺諸蟲闢鬼邪理惡瘡按仙經歷稱菖蒲為水草之精英神仙之靈藥然惟石磧水生莖細節密不沾土者方為上品銅刀刮去粗皮米泔浸之飯上蒸之藉穀氣而臻於中和真有殊常之效海藻鹹寒主癭癧癰腫癥瘕水腫疝氣痰壅食凝經云咸能軟堅海藻咸能潤下寒能泄熱故無堅不潰無腫不消洗淨鹹味焙乾昆布鹹寒主水腫噎膈瘰癧惡瘡昆布功同海藻凡海中菜皆損人勿多食洗去咸焙乾石斛甘而微咸脾腎藥也益中氣厚腸胃長肌肉逐邪熱壯筋骨強腰膝石斛甘可悅脾咸能益腎故多功於水土二臟但氣性寬緩無捷奏之功古人以此代茶甚清上膈凡使勿用木斛石斛短而中實木斛長而中虛不難分辨骨碎補苦溫腎經藥也主骨中毒氣風血痛破血止血補折傷理耳鳴牙痛筋骨傷碎者能療之故名骨碎補走入少陰理耳牙諸疾凡損筋傷骨之處用米粥裹傷處有效焙用谷部胡麻甘平補中益氣養肺潤腸堅骨明耳目逐風濕填腦髓久服延年胡麻子填精益氣仙家所珍取粟色者名鱉蝨胡麻比黑者更勝浮麥即小麥中水淘浮起者止自汗盜汗虛熱麥芽即大麥水浸生芽者開胃下氣消食和中神麯乃伏天用白麵百斤青蒿汁三碗赤豆末杏仁泥各三升蒼耳汁野蓼汁各三碗以配白虎青龍朱雀玄武勾陳螣蛇六神搜和作餅楮葉包窨如造醬黃法待生黃衣曬乾臨用炒消食下氣健脾暖胃除吐止瀉破癥結理痢疾按神麯與穀麥二芽脾胃虛人常宜服之以助戊己熟腐水穀與參朮香砂同用為佳薏苡仁甘平補肺益脾舒筋去濕消水腫理腳氣色白入肺味甘入脾治筋者必取陽明治濕者必扶土氣故有舒筋去濕之用然性主秋降之令每多下利虛而下陷者非其宜也淘曬炒粟殼酸澀微寒止瀉利固脫肛治遺精除久咳粟殼酸澀收斂其性緊急非久嗽瀉者不敢輕投也世俗聞而畏之概不肯用不知久利滑脫者非此不除因噎而廢食良醫不為也水洗去蒂及根膜取薄皮醋炒赤小豆甘酸性平消熱毒下水腫散惡血利小便止泄瀉世俗惟知治水不知扶土所以制水赤小豆健脾胃而利水濕直窮其本也其性善下久服則降令太過津血滲泄令人肌瘦一且毒腫為末塗之無不愈者但性極黏干即難揭入苧根末即不黏此良法也此即五穀中常食之品以緊小而赤黯者入藥其稍大而鮮紅及淡紅者並不宜用綠豆甘寒利水消腫解毒吐瀉解消渴白扁豆甘平脾之谷也暖脾胃止吐泄解諸毒消暑氣除濕熱扁豆氣味中和土家契合倉廩受培自能通利三焦升降清濁土強濕去正氣日隆炒熟去皮豆豉苦寒主傷寒頭痛煩悶溫毒發斑嘔逆血痢解肌發表補中下氣卓有神功炒熟則能止汗蒸餅甘平溫中健脾消食化滯和血止汗利三焦通水道惟面所造酵水發成在臘月及寒食日蒸之至皮裂去皮懸之風乾以水浸脹擂爛用飴糖甘溫補中健脾潤肺止嗽消痰止血是解渴解毒熬焦酒服能下惡血邢曹進飛矢中目拔矢而鏃留於中痛困俟死一僧教以寒食飴點之至夜瘡癢一鉗而出旬日而瘥
