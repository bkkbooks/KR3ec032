body:
  text: 卷下木部黃柏苦寒沉而下降為足少陰足太陽引經之劑肅清龍雷之火滋濡腎水之枯疏小便癃結驅下焦濕腫凡目赤耳鳴口瘡消渴血痢吐衄腸風腰膝痿軟者咸資其用東垣云小便不通而渴者熱在上焦氣分肺熱則不能生水法當淡滲豬苓澤瀉之類小便不通而不渴者熱在下焦血分無陰則陽無以化法當滋陰黃柏知母是也愚謂黃柏制下焦命門陰中之火知母滋上焦肺金生水之源蓋邪火焰明則真陰消涸真陰消涸則邪火益烈取知柏之苦寒以抑南扶北誠如久旱甘霖然火旺胃強者當之乃稱合劑倘中氣已殘則邪火雖亢命曰虛炎從事弗衰將有寒中之變非與甘溫則大熱不除近世殊昧斯旨而夭枉者不可勝數矣厚朴苦溫體重而降脾胃藥也溫中下氣是其本功凡健脾寬脹消痰止吐消食止痛厚朴利水皆溫中之力也能瀉胃實故平胃散收之寒脹必需乃結者散之之義然行氣峻猛虛者勿多與也東垣云苦能下氣故泄實滿溫能益氣故散濕滿質厚色紫者佳去粗皮薑汁浸炒杜仲辛溫入腎肝氣分之劑補腎則精充而骨髓堅強益肝則筋壯而屈伸利用故腰膝痠疼脊中攣痛者需之又主陰下濕癢小便餘瀝皆補力之馴致者也酥炙或咸酒炒去粗皮樗白皮苦而微溫專以固攝為用故瀉痢腸風遺濁崩帶者並主之然必病久而滑始為相宜若新病早服強勉固澀必變他症而成痼疾矣時珍曰血分受病不足者宜用椿皮氣分受病有郁者宜用樗皮凡用刮去粗皮生用則能通利醋炙即能固澀乾漆辛溫降而行血毒而殺蟲二者已罄其功能若祛風止痛除嗽理傳尸正行血殺蟲之效也性急多毒弗得過用凡畏漆者嚼椒塗口鼻免生漆瘡如杉木如紫蘇如蟹患漆瘡者皆可煎湯浴之炒令煙盡存性金鈴子即楝實味苦性寒導小腸膀胱之氣因引心包絡相火下行故療心及下部疝氣腹痛殺蟲利水也川産者良酒潤去核焙楝根白皮有殺蟲治瘡之功槐子槐子苦寒純陰肝經氣分藥也主清熱去濕故可療痔殺蟲明目固齒腸風陰瘡吐衄崩帶皂莢辛溫肺胃與厥陰氣分之劑通關節利九竅破堅積搜風逐痰辟邪殺蟲墮胎其味辛散其性燥烈吹喉鼻則通上竅導二陰則通下竅入腸胃則理風濕痰喘消腫殺蟲塗肌膚則清風去癢除毒消癰治急喉痹纏喉風用大皂莢四十挺切水三斗浸一夜煎至鬥半入人參末五錢甘草末一兩煎至五升去渣入無灰酒一升釜煤二七煎如飴入瓶封埋地中一夜每溫酒下一匙或掃入喉內取惡涎盡為度後含甘草片中風涎潮昏悶宜稀涎散大皂莢末一兩明礬五錢每服五分水調灌不大吐只微微涎出核治大腸燥結瘰癧腫毒刺能治癰未成能消已成即潰直達瘡所甚驗又治癘風殺蟲頗著神功訶子酸苦澀溫肺與大腸之藥也酸澀能固腸止瀉苦溫可下氣寬中止嗽化痰亦下氣之力腸風止血乃固腸之功生用則能清金行氣煨用則能暖胃固腸波斯國大魚放涎水中凝滑船不能通投訶子湯尋化為水則化痰可知麵裹煨透去核水楊苦平主久痢赤白癰腫痘毒魏直云痘瘡頂陷漿滯不行或風寒所阻以水楊枝葉五斤流水一大釜煎湯溫浴之如冷添湯良久纍起有暈絲者漿行也未滿再浴虛者只浴頭面手足初出及癢塌者勿浴如黃鐘一鼓而蟄蟲啓戶東風一吹而堅冰解凍誠有燮理之妙也蕪荑辛溫殺蟲消積主痔瘻惡瘡疥癬蘇木甘辛微酸三陰經血分藥也發散表裡風邪疏通稽留惡血風與血皆肝所主大都入肝居多少用則和血多用則破血棕櫚皮性澀止吐血衄血腸風下痢崩中帶下蓋澀可去脫宜於久病不宜於新病炒極黑存性巴豆辛熱祛臟腑停寒破堅積痰癖開通閉塞疏利水穀破血排膿殺蟲闢鬼巴豆稟陽剛雄猛之性有斬關奪門之功氣血未衰積邪堅固者誠有神功老羸衰弱之人輕妄投之禍不旋踵巴豆大黃同為攻下之劑但大黃性冷腑病多熱者宜之巴豆性熱臟病多寒者宜之故仲景治傷寒傳裡惡熱者多用大黃東垣治五積屬臟者多用巴豆世俗未聞此義往往以大黃為王道之藥以巴豆為劫霸之品不亦謬乎若急治為水穀道路之劑去皮心膜油生用緩治為消堅磨枳之藥炒令紫黑用炒至煙將盡可以止瀉可以通腸用之合宜效如桴鼓此千古之祕人所不知紙包壓去油者名之巴霜巴豆殼燒灰存性能止瀉痢桑白皮甘辛西方之品也瀉肺氣而痰水喘嗽皆除長於利水乃肺金實則瀉其子也古稱補氣者非若參耆之正補乃瀉邪所以補正也昧者信為補劑而肺虛者亦用之大失桑皮之面目矣刮去皮蜜水炒子名桑椹安神止渴利水消腫楮實甘平益腎助陽療腫去水能軟骨治哽枳殼苦辛微寒疏泄肺與大腸之氣故能逐水消痰化食寬脹定嘔止瀉散痞止痛小者名枳實功力稍緊夫枳殼枳實氣味不異功用相同古云枳殼主至高之氣枳實主下主血然仲景治上焦胸痹痞滿多用枳實古方治下焦痢痔腸結多用枳殼由是則枳實不獨治下而積殼不獨治高也蓋自飛門以至魄門皆肺主之三焦相通一氣而已則二物皆主利氣又何必分耶去穰麩炒山梔苦寒肺經藥也輕飄上浮所以瀉肺中之火金宮不被火擾則治節之令自能通調水道下輸膀胱故丹溪云能屈曲下行降火從小便泄去也寇氏曰仲景治汗吐下後虛煩不眠用梔子豉湯亡血亡津臟腑失養內生虛熱非此不除也仲景多用梔子茵陳取其利小便而蠲濕熱也古方治心痛每用梔子此為火氣上逆不得不降者設也今人泥丹溪之説不分寒熱通用梔子虛寒者何以堪之炒透用酸棗仁味酸性收故其主療多在肝膽二經肝虛則陰傷而煩心不臥肝藏魂臥則魂歸於肝肝不能藏魂故目不得瞑棗仁酸味歸肝肝得養故熟寐也其寒熱結氣痠痛濕痹臍下痛煩渴虛汗何一非東方之症而有不療者乎世俗不知其用誤以為心家之藥非其性矣山茱萸味酸微溫肝腎之藥也暖腰膝興陽道固精髓縮便溺益耳目壯筋骨止月水蓋腎氣受益則封藏有度肝陰得養則疏泄無虞味酸本屬東方而功力多在北方者乙癸同源也湯潤去核核能滑精切勿誤用金櫻子酸澀而平是以固精止瀉職有專司當其半黃之時正屬採收之候若至紅熟則味已純甘全無澀味安在其收攝之功哉丹溪云經絡隧道以宣暢為和平而味者資其澀性以取快欲必致他疾自不作靖咎將誰執去核並白毛淨郁李仁甘苦而潤其性主降故能下氣利水破血潤腸拌麵作餅微炙使黃勿令太熟空腹食之當得快利未利再進以利為度如利不止以醋飯止之忌食酪及牛馬肉神驗但須斟酌虛實勿得浪施也湯浸去皮尖及雙仁者研如膏女貞實苦平補腎養神黑髮明目冬青乃少陰之精遇冬月寒水之令而青翠不改則其補腎之功從可推矣酒浸蒸曬五加皮辛溫入肝腎兩經腎得其養則妄水去而骨壯故能主陰痿脊疼腰痛腳軟諸症肝得其養則邪風去而筋強故能理血瘀拘攣疝氣痛痹等症仙經贊其返老還童雖譽詞多溢然五加造酒久久服之添精益血搜風化痰強筋壯骨卓有奇功且其氣與酒相宜酒得之其味轉佳也枸杞子味甘氣平腎經藥也補腎益精水旺則骨強而消渴目昏腰疼膝痛無不愈矣弘景雲離家千里勿食枸杞甚言其補精強陰之功也按枸杞平而不熱有補水制火之能與地黃同功而除蒸者未嘗用之惜哉地骨皮即枸杞根也苦而微寒主治皆在腎肝夫腎水不足則火旺而為骨蒸煩渴吐血虛汗肝木不寧則風淫而為肌痹頭風及骨槽風惟地骨皮滋水養木故兩經之症悉賴以治洗淨沙土蔓荊子辛而微溫足太陽經藥也主太陽頭風頂痛目痛翳淚亦能固齒去白膜酒炒打碎山茶花止血衄腸風取紅者為末童溺調服密蒙花甘寒主目痛赤膜多淚羞明障翳酒蜜拌微炒側柏葉苦辛微溫主吐血衄血痢血腸風崩帶濕痹冷風歷節痛炙罯凍瘡汁塗黑發丹溪曰柏屬陰善守故採其葉者隨月建方取之得月令之旺氣為補陰之要藥其性溫燥大益脾上以滋其肺時珍曰柏性後凋稟堅凝貞靜之質乃多壽之木故道家以之點湯代茶元旦以之浸酒辟邪麝食之而體香毛女食之而身輕亦其證驗矣柏子仁甘平心腎藥也益氣養血清心安神補腎助陽去濕潤燥辟邪益智久服顏色美澤耳目聰明時珍曰柏子甘平不寒不燥甘而能補辛而能潤其氣清香能透心腎益脾胃仙家上品藥也列仙傳云赤松子久食柏實齒落更生行及奔馬非虛語也炒去衣研細松香苦甘平主一切瘡痍除熱祛風排膿化毒生肌止痛殺蟲療瘡弘景雲松柏皆有脂凌冬不調理為佳物時珍曰脂乃英華在土不朽流膏日久變為琥珀宜其可以辟穀延齡大釜加水白茅襯甑又加黃沙寸許布松脂於上炊以桑薪湯減頻添熱水候松脂盡入釜中取出投於冷水既凝又蒸如此三過乃佳服之通神明去百病松節搜風舒筋燥血中之濕松子仁益肺止嗽補氣養血潤腸止渴溫中搜風潤皮膚肥五臟陰虛多燥者珍為神藥肉桂甘辛性熱入脾腎二經益火消陰溫中健胃定吐止瀉破祕墮胎堅骨強筋桂心主風寒痛痹心腹冷疼破血結痃癖癥瘕膈噎脹滿內托癰痘引血化膿桂枝主傷風頭痛調營散邪去皮膚風濕手臂痛在下近根者為厚桂亦名肉桂在中者為桂心在上枝條為桂枝亦名薄桂亦名柳桂好古云或問仲景治傷寒當汗者皆用桂枝湯又云無汗不得用桂枝甘草湯一藥二用其義何也曰仲景云太陽中風陰弱者汗自出衛實營虛故發熱汗出又云太陽病發熱汗出者此為營弱衛強陰虛陽湊之故皆用桂枝發汗此調其營氣則衛氣自和風邪無所容遂從汗解非桂枝能開腠發汗也汗多用桂枝者以之調和營衛則邪從汗去而汗自止非桂枝能止汗也昧者不知其意遇傷寒無汗者亦用桂枝誤之甚矣桂枝湯下發汗發字當作出字汗自然出非若麻黃能開腠出其汗也醫余録云有人患赤眼腫痛脾虛不能食用涼藥治肝則脾愈虛用暖藥治脾則目愈痛但於溫平藥中倍加肉桂制肝益脾而一治兩得之故曰木得桂而枯是也用三種桂忌見火刮去粗皮辛夷辛溫溫中解肌通關利竅凡鼻淵鼻鼽鼻塞鼻瘡並研末入麝蔥白蘸入甚良時珍曰鼻通於天天者頭也肺也肺開竅於鼻而胃脈環鼻而上行腦為元神之府而鼻為命門之竅中氣不足清陽不升則頭為之傾九竅為之不利辛夷辛溫走氣而入肺其體浮能助胃中清陽之氣上通於天故能溫中治頭目鼻之病軒岐之後達此理者東垣一人而已刷去毛微焙沉香辛而微溫脾腎之劑也調中和氣溫暖命門凡脹悶霍亂癥癖積聚中惡鬼邪大腸虛閉小便氣淋男子精冷女人陰寒及痰涎血出於脾者併為要藥按沉香溫而不燥行而不泄扶脾而運行不倦達腎而導火歸元有降氣之功無破氣之害洵為良品磨細澄粉忌火丁香辛溫溫胃進食止嘔定瀉理腎氣奔豚救痘瘡灰白按丁香溫中健胃大有神功須於丸劑中同潤藥用乃佳獨用多用易於僭上損肺傷目去丁蓋乳子勿見火檀香辛溫脾肺藥也溫中下氣理噎膈吐食消風熱腫毒引胃氣上升以進飲食東垣云白檀調氣引芳香之物上至極高之分最宜橙橘之屬佐以薑棗葛根縮砂豆蔻通行陽明經在胸膈之上咽嗌之間為理氣要劑入湯泡勿煎入丸刮磨用降真香內服能行血破滯外塗可止血定痛焚之祛邪佩之闢鬼按沉香色黑故走北方而理腎檀香色黃故走中央而扶脾降香色赤故走南方而理血此物理之確然昭著者烏藥辛溫理七情鬱結氣血凝停霍亂吐瀉痰食稽留腫脹喘急腳氣疝氣止小便頻去腹中蟲大抵辛溫香竄為散氣神藥故百病咸宜雖貓犬之疴無不治療但性司專泄與藜藿者相宜錦衣玉食之人鮮不蒙其害者惟與參術同行庶幾無弊酒浸一宿炒乳香辛而微溫以活血和氣為功故能定諸經之痛內消腫毒托裡護心生肌去腐散風舒筋止痢催生一名熏陸香以酒研如泥水飛曬乾又同燈心研則易細沒藥苦平破血攻瘀止痛消腫生肌明目乳香活血沒藥散血故止痛生肌約略相同外科每每相兼而用修治與乳香同血竭甘鹽厥陰藥也行血止痛能收合瘡口性急不可多使卻引膿味鹽走血色赤象血厥陰為藏血之臟故獨入焉乳香沒藥雖主血分而兼入氣分此則專入於血分者也研細待衆藥磨完然後入之若同衆藥搗則化作飛塵也安息香辛苦性平主心腹惡氣結聚蟲毒霍亂鬼邪傳尸從安息國來不宜於焚而能發衆香故人取以和香乃辟邪去惡之聖藥酒煮研蘇合香甘溫芳香氣竄通達諸竅流行百骸故其主治辟邪殺鬼截瘧通神冰片辛苦微溫通諸竅散鬱火利耳目主喉痹腦痛鼻瘜牙疼傷寒舌出小兒痘陷東垣曰龍腦入骨凡風病在骨髓者宜之若風在血脈肌肉輒用腦麝反引風入骨如油入面莫之能出時珍曰古方皆言龍腦辛涼入心故目疾驚風及痘瘡心熱血瘀倒靨者用豬血入心使毒散於外則痘發此似是而非也目與驚及痘皆火病也火鬱則發之從治之法辛主發散故也使壅塞通利經絡調達而驚熱自平瘡毒能出用豬心血引龍腦入心非龍腦能入心也廖瑩中熱酒服龍腦九竅流血而死非龍腦有毒乃熱酒引其辛香氣血沸亂而致也樟腦辛熱純陽故長於去濕殺蟲宣通關竅阿魏辛溫破結塊殺細蟲消肉積闢鬼截瘧止痢解毒止臭談逵久瘧用阿魏硃砂各一兩研勻米糊丸皂子大空心人參湯化服一丸即愈如痢疾以黃連木香湯下蓋瘧痢多起於積滯故耳蘆薈苦寒厥陰藥也其用專主瀉肝滌熱故能殺蟲明目療癬蟲齒小兒驚癇疳症胡桐淚鹹苦而寒車師國胡桐樹脂也除瘰癧清咽喉固牙齒味鹹入骨性寒滌熱故主治如上菜部韭味辛溫溫中下氣補虛益陽固精止痢除噎散結主唾血吐血衄血尿血女人經脈逆行打撲損傷生搗汁服散胃脘瘀血理胸痹刺痛素問言心病宜食韭本草言其歸腎文雖異而理則相貫蓋心乃肝之子腎乃肝之母母能令子實虛則補其母也韭子補肝腎暖腰膝主男子精滑溺頻女人白淫白帶曝乾去黑皮炒蔥白辛溫入手太陰足陽明經專主發散以通上下陽氣故傷寒頭痛用之少陰下利清穀裡寒外熱厥逆脈微白通湯主之亦有蔥白面赤者四逆湯加蔥白成注曰腎惡燥急食辛以潤之蔥白辛溫以通陽氣也陰症厥逆唇青用蔥白一束去根及青葉留白約二寸烘熱安臍上以尉斗尉之蔥爛則易熱氣透入服四逆湯即瘥蔥同蜜食能殺人大蒜辛溫健脾下氣消穀化肉破結殺鬼搗爛同道上熱土新汲水服能救中暑搗汁飲主吐血心病同黃丹丸止瘧痢搗塗臍消下焦水利二便貼足心引火下行止吐衄納肛通幽門治關格隔蒜片灸一切毒辛能散氣熱能助火久食多食傷肺損目昏神伐性患痃癖者每日取三顆截卻兩頭吞之名曰內灸必效白芥子辛熱入手太陰與足陽明溫中散寒豁痰利竅止心腹痛散癰腫瘀血多食則昏目動火泄氣傷精丹溪曰痰在脅下及皮裡膜外非白芥子莫能達虛人痰嗽白芥子同蘇子卜子煎好入蜜與薑汁各一匙殊妙蘿蔔辛甘下氣消食和中化痰解酲散血大治吞酸搗汁服治吐衄血消渴塗湯火跌打傷解面毒楊億云種芋三十畝省米三十斤種蘿蔔三十畝益米三十斤則蘿蔔果能消食也服地黃何首烏忌食蘿蔔食則令人髭發白有人被賊火熏垂死以蘿蔔菜生嚼汁咽即蘇子能定喘消痰消食除脹利大小便消癰腫毒生用能升熟用能降生薑性溫味辛肺脾藥也益脾肺散風寒通神明去穢惡止嘔吐化痰涎除煩悶去水氣消脹滿定腹痛殺長蟲消宿食理冷痢通血閉生用發散熟用和中要熱則去皮要冷則留皮秋多食薑至春患眼癰疽食薑則生惡肉孕婦食薑令子多指孫真人云薑為嘔家聖藥嘔乃氣逆不散薑則辛以散之也夜勿食薑者夜令主闔薑性主闢也秋勿食薑者秋令主收而薑性主散也早行含一塊不犯霧露清濕之氣山嵐不正之邪凡中風中暑中氣中毒中惡霍亂一切卒暴之病薑汁與童便同服立效薑能開痰下氣童便降火也薑皮性涼和脾胃消水腫除脹滿去目翳乾薑乃江西所造水浸三日去皮浸六日更刮去皮曬乾置瓷缸中釀三日始成辛熱之辛肺脾藥也溫中下氣止嘔消痰破瘀生新搜寒攻濕盡有生薑之功而力量更雄也生則逐寒邪而發表炮則除胃冷而守中多用則耗散元氣蓋辛以散之壯火食氣也須以生甘草緩之服乾薑者多僭上不可不知引血藥入血分引氣藥入氣分去瘀養新有陽生陰長之能故吐衄血及腸風下血血虛失血者並宜炮黑乃熱因熱用從治之法也胡荽辛平消穀進食通心發痘利大小腸通小腹氣拔四肢熱解魚肉毒辟邪鬼氣茴香辛溫暖下焦逐膀胱胃間冷氣調中進食療諸疝腹痛吐瀉胃寒形如麥粒為小茴香性溫宜入食料中形如柏實裂成八瓣者為大茴香性熱損目不宜多用微妙山藥甘平脾肺藥也補脾肺益腎陰養心神除煩熱止遺泄固腸胃生搗貼腫毒能消散山藥色白歸肺味甘歸脾其言益腎者金為水母金旺則生水也土為水仇土安則水不受侮也炒黃用百合甘平溫肺止嗽補中益氣利大小便安和心膽止涕淚主百合病辟邪鬼魅冬葵子甘寒入小腸膀胱二經主滑胎産逆生者得之即順胎死者得之即下療熱淋通乳汁堪潰癰疽白冬瓜甘寒入脾胃大小腸四經主胸前煩悶作渴臍下水脹成淋通二便解熱毒可貼癰疽又解丹石魚毒丹溪曰久商與陰虛者忌之未被霜者食之成反胃病果部杏仁辛苦微溫手太陰藥也潤肺燥除風熱定咳嗽散滯氣消食積潤大腸殺狗毒爛索粉積辛能橫行而散苦能直行而降遂為要劑湯泡去皮尖炒黃研碎風寒肺病藥中連皮尖用取其發散雙仁者有毒不宜用巴達杏仁味甘美止咳下氣潤腸化痰力稍薄烏梅酸澀主斂肺澀腸生津化痰安蛔清熱截瘧止痢消酒定嗽白梅即霜梅主中風牙關緊閉擦牙齦涎出即開止瀉治渴止下血崩帶功仿烏梅桃仁甘辛微溫主血結瘀閉癥瘕潤腸殺蟲苦重於甘氣薄味厚厥陰血分藥也凡行血連皮尖生用活血潤燥去皮尖炒用大棗甘平脾之果也補脾益氣潤肺止嗽殺附子毒東垣云和陰陽調榮衛生津液仲景治奔豚用大棗者滋脾土以平腎氣也治水飲脅痛有十棗湯益脾土而勝妄水也棗能調臟腑和百藥為切要佳品若多食損齒生蟲好古云中滿者勿食甘甘多令人滿故仲景建中湯心下痞者去飴棗與甘草同例蛀棗止痢紅棗主治相同功力稍緩止瀉藥用以作丸梨味甘寒潤肺涼心消痰降火止嗽除渴生者清六腑之熱熟者滋五臟之陰梨者利也流利下行之謂也多食令人寒中發瀉脾虛者尤禁木瓜酸溫肝脾藥也強筋舒筋主腳氣霍亂轉筋收攝脾土去濕熱止吐瀉化痰食理水脹木瓜專主筋病然皆脾病非肝病也肝雖主筋而轉筋則由濕熱或寒濕之邪襲傷脾故轉筋必起於足腓腓及宗筋皆屬陽明木瓜治轉筋非益筋也理脾以伐肝也孟詵云多食木瓜損齒及骨皆伐肝之明驗陶弘景雲轉筋時但呼木瓜名及書上作木瓜字皆驗此理亦不可解山楂酸溫消油膩血肉之積化血瘀瘕癖之疴驅小兒乳食停留療女人兒枕作痛理偏墜疝氣發痘疹不快按山楂味中和消油垢之積故幼科用之最宜若傷寒為重症仲景於宿滯不化者但用大小承氣一百一十三方中並不用山楂以其性緩不可為肩弘任大之名煮老雞肉硬入山植數粒即爛則其消肉積之功可推矣核有功力不可去也石榴皮止下痢泄精腸風崩帶性極酸澀善於收攝初病者忌用不拘乾溼勿犯鐵器漿水浸一夜取出用其水如墨汁陳皮苦辛而溫入太陰經健脾開胃下氣消痰消穀進食定嘔止瀉能補能消能散能降調中理氣功在諸藥之上辛宜於肺香利於脾肺為攝氣之籥脾為元氣之母陳皮理氣故為二經要藥同補藥即補同瀉藥則瀉同升藥則升同降藥則降故利用最弘去白者理肺氣留白者和胃氣筋膜及蒂並去之芳草之品不見火則力全也青皮小者為青皮功用悉同但性較猛耳青皮如人當年少英烈之氣方剛陳皮如年至老成則躁急之性已化青皮入肝者以其色也究竟主肺脾之症居多瘧脈自弦肝風之祟青皮入肝散邪入脾滌痰故瘧家為必需之品橘肉甘者潤肺酸者聚痰核疏疝氣葉散乳痛枇杷葉苦辛平肺胃藥也清肺則降火而除痰嗽和胃則寬中而止嘔噦胃病以薑汁塗炙肺病以蜜水塗炙肥厚而大者良刷去毛淨不爾令人咳白果即銀杏甘平熟食溫肺益氣定喘嗽縮小便止白濁除白帶生食降痰消毒殺蟲嚼漿塗面去疱皶及疥癬疳𧈟陰蟲胡桃甘溫溫肺止嗽養血潤腸利三焦氣益命門火時珍曰夫三焦者元氣之別使命門者三焦之本原益一原一委也命門指所居之腑而名為藏精系胞之處三焦指分治之部而名為出納熟腐之司命門在七節之旁兩腎之間下通二腎上通心肺貫屬於腦為生命之原相火之主積氣之府靈樞已著其厚薄緩急之狀而難經不知原委之分以右腎為命門謂三焦有名無狀高陽謬訣承其訛説以誤後人至朱肱陳言戴起宗始闢之而知者尚少胡桃仁頗類其狀故入北方通命門利三焦為腎命之藥夫命門與腎相通藏精血而惡燥若腎命不燥精氣內充則飲食自健腸腑潤而血脈通命門既通三焦自利故上通於肺而止虛寒喘嗽下通於腎而止腰腳虛疼內而腹痛可已外而瘡毒可散其利溥哉龍眼甘溫養心益智開胃益脾潤肺止咳橄欖澀而甘平生津止渴清咽止咳開胃下氣止瀉固精解一切魚毒及酒毒棐子消穀進食殺蟲化積止嗽助陽療痔止濁檳榔苦辛微溫下氣消脹逐水除痰殺蟲治痢消食破積止瘧療疝腳氣瘴癘按檳榔泄至高之氣能墜諸藥達於下極故治痢家後重如神閩廣多瘴癘嗜之以為上珍苟無瘴而食之寧無損正之憂乎去心者刮去臍皮見火無功大腹皮辛溫主水氣浮腫腳氣壅逆胎氣惡阻大腹子與檳榔同功大腹樹多集鴆鳥用其皮者豆汁洗淨川椒辛熱通三焦補命門散寒除濕解鬱消食理痹止瀉壯腰膝縮溺頻除寒嗽消水腫祛痰飲破癥結伏蛔蟲按椒性下達命門益下不上衝蓋導火歸元也味辛應四方之氣故入肺而奏止嗽下氣之功性溫稟南方之氣故入腎而奏扶陽益火之效乃玉衡星之精善闢疫伏邪此歲旦有椒柏酒也凡空心朝起以沸湯送生椒二十顆有治熱治寒之妙有消食散冷之奇久服則永不受風寒濕大能溫補下焦亦神異之品也邵武府張伯安腰痛痰喘足冷如水面赤如丹六脈洪大按之則軟服八味無功用椒紅茯苓蜜丸鹹湯下甫二十日而安去核及閉口者微炒使出汗搗去黃殼取紅用椒核利小便治水腫痰飲耳聾盜汗吳茱萸辛熱脾肝腎三陰經藥也溫中下氣開鬱止痛逐風除濕定吐止瀉理關格中滿腳氣疝瘕制肝燥脾按川椒善下茱萸善上故食茱萸者有沖膈沖眼脫髮咽痛動火發瘡之害鹹湯浸去烈汁焙乾用陳久者良閉口者有毒茗苦甘微寒下氣消食清頭目醒睡眠解炙煿毒酒消暑同薑治痢按茗得天地清陽之氣故善理頭風肅清上膈使中氣寬舒神情爽快此惟洞山上品方獲斯功至如俗用雜茶性味惡劣久飲不休必使中土蒙寒元精暗耗輕則黃瘦減食甚則嘔泄痞腫無病不集害可勝哉茶序云消停釋滯一日之利暫佳瘠氣侵精終身之纍斯大東坡云除煩去膩不可無茶然空心飲茶直入腎經且寒脾胃乃引賊入室也甜瓜蒂苦寒傷寒病在上焦懊憹逆氣衝喉不得息膈上有痰食水氣同香豉煮糜去滓服之取吐瓜帶吐法素問所謂在上者因而越之也若尺脈虛者不敢用此法凡虛弱人均宜戒之西瓜甘寒解暑消煩止渴利水西瓜性冷世俗取一時之快忘腸胃之憂古人有天生白虎之號稔其寒也不明者妄云不傷脾胃誤矣藕味甘平生者散血清熱解渴除煩熟者補中開胃消食和中搗絞汁澄粉乃其精華也安神開胃喜悅忘憂蓮子甘平補中養神清心固精止瀉除崩帶赤白濁安靖上下君相火邪使心腎交而成既濟之功蓮鬚甘澀清心止血通腎固精男子腎泄女子崩帶荷葉開胃消食止血固精葉蒂安胎東垣云潔古先生口授枳朮丸方用荷葉燒飯為丸夫震者動也人感之生足少陽甲膽之氣與三焦之氣同為發生素問云履端於始序則不愆荷葉生於水土之中其色青其形仰其中空象震卦之體食與藥感此氣之化胃氣何由不升乎是以燒飯和藥與白朮協力補脾不致內傷其利廣矣芡實甘而微澀補中助氣益腎固精古方芡實與蓮子對配金櫻膏和丸固精神劑芡本無大益而比之曰水硫黃何也食芡者必枚齧而咀嚼之使華池津液流通轉相灌溉其功勝於乳石也乾柿甘寒而澀止胃熱口乾潤心肺消痰治血淋便血霜治咽喉口舌之瘡蒂療咳逆噦氣香櫞苦酸辛溫理上焦之氣止嘔逆進食健脾按香櫞性中和單用多用亦損正氣與參術同行則無弊也荔枝核甘溫而澀治疝氣頽腫療腎陰如斗按荔枝性熱主散無形質之滯氣其核溫通行肝腎其結實必雙而核肖睪丸故治頽疝卵腫類象形之意也卒心痛以一枚煅存性研末酒服痘瘡出不快荔殼煎湯飲甘蔗甘平和中而下逆氣乾嘔不息蔗漿薑汁同溫服小兒口疳用皮燒末吹之石蜜甘溫生津解渴除咳消痰潤心肺燥熱助脾暖肝按石蜜即白沙糖蔗汁煎曝而成是也甘入脾多食則病脾西北人宜之東南人少餌比之紫沙糖紅沙糖功用相同若多食損齒一也寓木部茯苓甘淡而平入手足太陰足太陽補中開胃利水化痰安神定悸生津止瀉止嘔逆除虛熱赤者專主利小便驅濕熱而已茯苓藉松之餘氣而成得土氣最全故作中宮上藥本草言其利小便伐腎邪東垣乃言小便多者得止澀者通利丹溪又言陰虛者不宜用義似相反何哉茯苓淡滲上行生津液開腠理滋水之上源而下降則利小便潔古謂其屬陽浮而升言其性也東垣謂其陽中之陰降而下言其功也經云飲食入胃遊溢精氣上輸於肺通調水道下輸膀胱則知淡滲之藥俱先上升而後下降也小便多其源亦異經云肺氣盛則小便數虛則小便遺心虛則少氣遺溺下焦虛則遺溺胞移熱於膀胱則遺溺膀胱不利為癃不約為遺溺厥陰病則遺溺所謂肺盛者實熱也必氣壯脈強宜茯苓以滲其熱故曰小便多者能止也若肺虛心虛胞熱厥陰病者皆虛熱也必上熱下寒脈虛而弱法當用升陽之藥升水降火膀胱不約下焦虛者乃火投於水水泉不藏脫陽之症必肢冷脈遲法當用溫熱之藥峻補其下二症皆非茯苓輩淡滲之藥所能治故曰陰虛者不宜用也茯神主用與茯苓無別但抱根而生有依附之義故魂魄不安不能附體者乃其專司也赤茯苓但能瀉熱行水並不及白茯苓之多功也琥珀甘平消瘀血利小腸通五淋安魂魄闢鬼邪去目翳丹溪曰琥珀能燥脾土脾能運化則肺氣下降故小便可通若因血少而小便不利者反致燥急之苦豬苓甘淡而平入足太陽開腠理利小便療痎瘧利小便之劑無如此駃故不入補方也雷丸苦寒清胃熱殺三蟲本經稱其利丈夫別録云久服陰痿似乎相反不知利者疏利也疏利太過則閉藏失職故陰痿也桑寄生甘平和血脈助筋骨充肌膚堅齒髮安胎止崩丹溪云海外地暖不蠶桑無採捋之苦則生意濃自然生出何常節間可容他子耶連桑枝採者乃可用之偽者損人忌鐵忌火苞木部竹葉甘寒清心熱降肺氣止咳逆解狂煩竹茹降火止嘔清肌膚熱理吐衄血療傷寒勞復小兒熱癇婦人胎動竹瀝主中風痰湧不語顛狂胸痹凡痰在經絡四肢及皮裡膜外非此不能達丹溪曰世人食筍自幼至老未有因其寒而病者瀝即筍之液也又假火而成何寒之有時珍曰竹瀝宜風火燥熱之痰胃虛腸滑者不可餌也天竺黃甘寒清心化痰主中風痰湧失音小兒驚癇天吊氣性中和故小兒宜之荊瀝甘寒去心腹之煩熱化經絡之風痰洽胸漾漾中欲吐理頭風旋運目眩按荊即今作刑杖之荊也取新採荊莖截尺許架兩磚上中間火炙兩頭盛所滴汁名曰瀝加薑汁二匙瀝一杯同服延年祕録云熱多用竹瀝寒多用荊瀝並以薑汁助送則不凝滯但氣虛不能食者用竹瀝氣實能食者用荊瀝若胃弱者忌之蟲部蜂蜜甘平和營衛潤臟腑通三焦理脾胃解諸毒和百藥導便結生能清熱熟則補中凡煉蜜一斤入水四兩銀石器內文火煉掠去浮沫至滴水不散為度蠟主下痢貼瘡生肌止痛五倍子酸平斂肺降火化痰止痢斂汗解毒生津液斂潰瘡收脫肛摻口瘡止諸血凡口齒咽喉眼鼻皮膚風濕瘡癬皆不可缺桑螵蛸興陽益精固遺泄攝小便漿浸一日焙白殭蠶驚癇病風者也治風化痰散結行經所謂因其氣相感而以意使之者也蓋厥陰陽明之藥故又治諸血病瘧與疳也咽喉腫痛及喉痹下咽立效大能救人去綿並黑口炒之蠶蛾益精固精強陽不倦雄者入藥炒足翅去用蠶沙尉風痹及一切關節皮膚其性溫燥能勝風去濕麻油浸研主爛弦風眼塗之二三次頓痊斑蝥攻血積利水道治疝瘕解疔毒猘犬毒蠱毒輕粉毒治瀝墮胎按斑蝥專主走下竅直至精溺之處蝕下敗物但痛不可當虛者大禁麩炒醋煮蠍主中風半身不遂口眼喎邪語澀手足抽掣小兒驚風尤為要藥專入厥陰理肝膽家症去足炒水蛭鹹苦而寒攻一切惡血堅積腹中有子者去之性最難死雖火炙為末得水即活若水蛭入腹生子為害腸痛黃瘦惟用田泥和水數碗飲之必盡下蓋蛭在入腹忽得土氣而下耳或牛羊熱血同豬脂飲之亦下服蜂蜜亦下蟾酥甘辛入足陽明少陰治發背疔腫脈絡風邪惡血蟬蛻鹹甘而寒開腠理宣風熱發痘疹除目翳出音聲止瘡癢小兒噤風天吊夜啼驚癇蟬乃土木餘氣所化餐風吸露其氣清虛故主療一切風熱止夜啼者取其晝鳴而夜息也去泥足翅洗曬螻蛄去水甚捷但虛人難用兼主瘰癧骨硬出肉中刺箭鏇杵汁滴三五次自出去足翅炒蟅蟲破一切血積跌打重傷焙為末服二錢酒下接骨神效去足炒虻蟲凡血在臟腑經絡者驅逐攻下蓋食血而能治血因其性而為用也去足翅焙蜈蚣辛溫治蛇癥療小兒驚吊臍風撮口墮胎解毒鱗部龍骨甘平性澀澀可去脫故能收斂浮越之氣固大腸止遺泄下血定驚止汗除崩帶煅赤研細水飛稍不極細則黏著腸胃晚年作熱龍齒鎮心神安魂魄龍者東方之神故其骨與齒皆主肝病許叔微云肝藏魂能變化故魂遊不定治之以龍齒煅過研細水飛穿山甲咸微寒主痰瘧通經脈下乳汁消癰腫排膿血通竅發痘殺蟲好食蟻故治蟻瘻其性走竄未可過服炒黃打碎蘄蛇鹹溫有毒主一切風症中風大風白癜風蛇性竄利內走臟腑外徹皮膚無處不到有毒不敢輕用其蛇龍頭虎口黑質白花脅有二十四個方勝文膜有念珠班口有四長牙尾上有一拂日長一二分腸形如連珠酒浸一宿炭火焙乾埋地中出火毒去皮骨取肉用海螵蛸味鹹微溫入足厥陰少陰血分治女人赤白帶下經閉療丈夫陰腫囊濕同蒲黃撲之耳內疳瘡吹之小兒重舌鵝口同蒲黃傅蟲心痛醋磨濃頓服愈介部龜甲鹹平腎經藥也稟北方純陰之氣而生大有補水以制火之功故能強筋骨益心智止咳嗽截久瘧去瘀血生新血大凡滋陰降火之藥多是寒涼損胃惟龜甲益大腸止泄瀉使人進食真神良之品也龜鹿皆靈而壽龜首藏向腹能通任脈故取其甲以養陰鹿鼻反向尾能通督脈故取其角以養陽去脅用底去黑皮酥炙鱉甲鹹平肝經藥也截久瘧消瘧毒破癥瘕行瘀血退煩熱補新血按龜鱉皆主養陰滌熱鱉色青故入東方而理肝家諸症龜色黑故走北方而理腎經諸症七肋者佳不經湯煮者醋炙黃研細蟹味鹹性寒散結血通經脈退諸熱療漆瘡續筋骨爪能破血墮胎最能動風亦能寒胃牡蠣鹹寒化痰軟堅清熱除濕止遺泄腸滑小便多盜汗心脾病赤白濁崩帶疝瘕積塊癭癧好古曰牡蠣入足少陰為軟堅之劑以柴胡引之去脅下硬以茶引之消項上核以大黃為使能益精收澀止小便黃泥固濟火煅珍珠鎮安心神點降固翳絹包入腐中煮研海蛤鹹平主水腫利大小腸止喘嘔咳逆清熱去濕化痰消積及癭瘤石決明鹹寒入足厥陰少陰經內服而翳障消除外點而赤膜盡散清肝肺之風熱解白酒之味酸火煅研末以酒蕩熱入末調勻蓋一時飲之不酸又名千里光以其功效名之可以浸水洗眼目病之外無他用也久服令人寒中鹹水煮或涎裹煨磨去粗皮研萬遍水飛用七孔九孔者良禽部鴨味甘性平主虛勞骨蒸惟白毛黑嘴者方有其功取金肅水寒之象也嫩者毒老者良烏骨雞北方之色故補陰退熱若他色者最能動風助火蓋巽為雞感風木之化也雞內金乃肫內黃皮男用雌女用雄即雞膍胵也主反胃吐食大腸泄痢小便頻數精滑崩帶雞屎白白乃雄雞屎也主腹滿水腫能下氣利大小便此岐伯神方也大虛者亦勿用雞卵性平精不足者補之以氣故卵白能清氣治伏熱目赤喉痛諸疾形不足補之以味故卵黃以補血治下痢胎産諸疾五靈脂甘溫肝經血分藥也主行血散血和血止一切胸膈腹脅肢節肌膚痛症亦能下氣殺蟲凡血崩及女人血病百藥不效者立可奏功亦神藥也多夾砂石極難修治研細酒飛去砂石曬乾獸部阿膠甘平肺肝藥也主吐血衄血淋血尿血腸風下血女人血枯崩帶胎産諸病男女一切風病水氣浮腫勞症咳嗽喘急肺痿肺癰潤燥化痰利小便調大腸之聖藥也蛤粉或糯米粉同炒成珠牛黃苦平清心化熱利痰涼驚安神辟邪體輕氣香置舌上先苦後甘清涼透心者為真虎骨辛溫追風定痛健骨驅邪風從虎者風木也虎金也木承金制安得不從故虎嘯而風生所以治風疴攣急骨節風毒等症犀角苦酸而寒清胃涼心辟邪解毒理吐衄腸風及畜血發狂譫語發斑痘疹之熱毒羚羊角鹹寒專主肝症平肝舒筋明目定驚清熱解毒散血下氣羚羊屬木故入厥陰同氣相求也鹿茸鹹溫腎經藥也補火助陽生精益髓強筋健骨暖腰壯膝固精攝便安胎殺鬼鹿稟天地純陽之氣氣化振密其角自生至剛無兩月之久大者至二十餘斤凡物之生無速於此故能強陽補骨非他藥可比也長大為角與茸同功力少遜耳麝香辛溫通經絡開諸竅透肌骨闢鬼邪去三蟲攻風痰祛惡夢墮胎孕止驚癇時珍曰嚴氏言風病必先用麝香丹溪謂風病血病必不可用皆非通論矣愚按麝香走竄通諸竅之閉塞開經絡之壅滯若諸風諸氣諸血諸痛癇瘕等病經絡壅滯孔竅閉塞者安得不用以開之通之耶非不可用也但不可過耳獺肝甘平主傳尸勞極鬼疰蟲毒上氣咳嗽殺蟲止汗膃肭臍咸熱益腎臟壯腎事補勞傷破積聚入藥用外腎而曰臍者連臍取之也毛色似狐頭形似狗尾形似魚腎上兩重薄皮裹其丸核皮上有黃毛一穴三莖近多偽者不可不辨酒浸炙搗人部發味苦性平補真陰通小便消瘀血生新血理咳嗽止崩帶牙齒咸熱除勞止瘧治乳癰未潰痘瘡倒靨時珍曰人牙治痘陷近稱神品然一概用之貽害不淺齒者腎之標骨之餘也痘瘡毒自腎出外為風寒穢氣所觸腠理閉塞血澀不行毒不能出變黑倒靨宜用人牙以酒麝達之竄入腎經發出毒氣痘自紅活若伏毒在心而昏冒者及氣虛色白癢塌不能作膿熱沸紫泡之症宜用解毒補虛誤用人牙反成不救人中黃即金汁也主熱病發狂痘瘡血熱勞極骨蒸解一切毒用棕皮綿紙鋪黃土澆糞淋土上濾取清汁入新甕內碗蓋埋土中經年取出清如泉水全無臭氣年久者彌佳小便鹹寒滋陰降火止血和經去瘀養新定嗽消痰童男者尤良時珍曰小便入胃隨脾之氣上歸於肺通調水道下輸膀胱乃其舊路也故能清肺導火下行褚澄云喉不停物毫髮必咳血既滲入愈咳愈滲惟飲溲溺則百不一死若服寒涼則百不一生人中白乃溺器澱白垽也煅過水飛用主降火消血止咳化痰理咽喉口齒秋石滋腎水理虛勞安五臟潤三焦消痰嗽退骨蒸秋月取童便十斛每石入皂莢汁一碗竹杖攪千餘下候澄去淫留垽刮下再以秋露水煮化筲箕內鋪紙淋過再熬如此七次其色如雪方入罐內鐵盞蓋定咸泥固濟升打三炷香取出再研再如前升打鐵盞上用水徐徐擦之水不可多多則不結又不可少少則不升從辰至未退火冷定盞土升起者為秋水味淡而香乃秋石之精英也有滋腎固元清痰退熱之妙其不升者即秋石也但能降火化痰而已近者雜取人溺不擇時令盡失其道奚取其名乎射利欺世豈能應病耶人乳甘涼補真陰潤枯燥悅皮膚充毛髮點目疾按婦人之血下為月經上為乳汁以人補人功非渺小世俗服者多瀉遂歸咎於人乳不知人乳滋潤嬰兒食之便溏者有之如乳與食混進宜乎發瀉何怪也當夜半服之昨日之食已消明日之食未進且陰藥服於陰分正相宜也服乳者須隔湯熱飲若曬曝為粉入藥尤佳紅鉛味鹹性溫救虛損理沉疴回生起死返老還童理女勞復解箭瘡毒按仙經云男子初生純乾體也十六歲精通則乾變而為離中虛女子初生純坤體也十四歲經生則坤變而為坎中滿所以男子一身屬陽惟精屬陰女子一身屬陰惟經屬陽故曰取將坎位中心實補卻離宮腹裡虛正謂是也誠延齡至寶卻病神丹然惟首經乃獲靈奇若是常經僅堪補益蓋嘗論之水穀入胃泌別熏蒸化煉精微上奉於肺流溢於中布散於外中焦受汁變化成赤行於隧道以奉生身是之謂血命曰營氣婦人之經上應太陰下應潮汐故有月事之稱又稱經水經者常也又稱天癸者天一生水地天稱紅鉛者鉛於五金之中獨應北方之水也凡患虛勞內蠱神氣敗壞命如懸絲百藥無功獨有斯方真堪奪命但修煉有法服食有度非宿有因緑者未易遇也津唾主瘡腫疥癬皶疱五更未語者頻塗擦之又明目退翳解毒辟邪凡人舌下有四竅兩竅通心氣兩竅通腎液心氣流入舌下為神水腎液流入舌下為靈液溢為醴泉聚為華池散為津液降為甘露所以灌溉臟腑潤澤肢骸故養生家咽納津氣謂之清水灌靈根能終日不唾則精氣常流容顏不老若多唾則損精氣成肺疾皮膚枯涸故曰遠唾不如近唾近唾不如不唾人有病則心腎不交腎水不上則津液乾枯難經云腎主五液入肝為淚入肺為涕入脾為涎入心為汗自入為唾也範東陽云凡人魘死不得叫呼但痛咬腳跟及拇指甲際多唾其面徐徐喚之自省黃震云宗定伯夜遇鬼問其所畏曰唯畏唾耳急持之化為羊恐其變化因大唾之賣獲千錢故知鬼真畏唾也人氣主下元虛冷胸腹不快骨節痹痛令人更互呵尉甚良按火即是氣氣即是火兩者同出而異名故元氣為真火天非此火不能生物人非此火不能有生故老人虛人與少陰同寢藉其熏蒸之益杜詩云暖老須燕玉正此意也但勿縱欲以喪寶耳術家用童鼎救人從鼻竅臍中精門三處按法進氣謂之龍來帳里奪明珠吐氣衝開九竅虎到坐前施勇猛巽風鼓動三關起必死之沉疴握長生之要道續漢書云史循宿禁中寒病發求火不得衆口更噓其背尋愈抱朴子云人在氣中氣在人中天地萬物無不需氣以生善行氣者內以養生外以卻惡從子至巳為生氣之時從午至亥為退氣之時常於生氣之時鼻引清氣入多出少氣極乃微吐勿令耳聞習之無間漸至口鼻無氣僅微微從臍中出入此為胎息善行氣者可避飢渴可永年命可行水面可入水中可卻百病以噓水則水逆流噓火則火遙滅噓沸湯則手可探噓金瘡則血自止噓刃則鋒不能入噓矢則簇不能傷噓犬則不吠噓虎則退伏氣本無形神奇若此道家取先天祖氣孟夫子取善養浩然氣之於人生死變化莫不由之大矣哉天靈蓋治傳尸鬼疰邪瘧古人以掩暴骨為仁厚方士取人骨為藥餌有仁心者固如是乎大且不食犬骨人食人骨可乎而以他藥代之何所不可乃必欲取之傷德甚矣紫河車味鹹性溫主男女虛損勞極不能生育下元衰憊丹書云天地之先陰陽之祖乾坤之橐籥鉛汞之胚胎九九數足我則載而乘之故名河車崔行功云胞衣宜藏天德月德吉方深埋緊築令兒長壽若為鳥獸所食多病難育此亦銅山西崩洛鐘東應自然之理也今蒸煮而食獨不思崔氏之禁乎男病用女胎女病用男胎米泔洗淨銀針遍刺透童便好酒各半浸半日揉洗極潔收乾水氣入鉛盒中加煉蜜半斤仍將焊藥焊固入釜中煮三香待別藥俱完取出搜和為丸既不出氣又賴鉛以制其毒乃為神良臍帶性溫固腎命門充養血氣預解胎毒按嬰兒在母腹中為胎所裹口鼻不能通氣但有臍帶通於母之肺系母呼亦呼母吸亦吸直待出離母腹因地一聲臍帶既剪一點真元屬之命門臍乾自落如瓜脫蒂故丹經以臍為命蒂信然金石部金箔辛平鎮邪祟安魂魄制癲癇生金有毒能殺人用箔不得過二分仲景紫雪方用赤金煎液取其制肝風降炎逆也輕粉水銀所傷非金莫療銀箔性味主治皆同金箔但金有毒而銀無毒耳自然銅辛平消瘀血續筋骨止痛排膿不可多服銅青酸走厥陰故能退利風痰眼障蟲疳皆治鉛甘寒屬水入腎秉北方癸氣陰極之精其體重實其性濡滑故黑錫丹得汞交感治上盛下虛氣升不降發為眩暈噎膈反胃鎮墜之性有反正之功但偏於陰降不可多服燒酒醋釀成鉛水為降火神丹然亦禁多用黃丹體重性沉味兼咸能墜痰去怯治驚癇顛狂吐逆能消積殺蟲治疳疾瘧痢能解熱拔毒長肉去腐治惡瘡腫毒鐵落制肝下降主善怒發狂顛癇驚邪客忤紫石英甘溫手少陰足厥陰血分藥也上能鎮心重可去怯也下能益肝濕可去枯也心主血肝藏血性暖而補故神不安血不足虛寒不孕者宜之硃砂甘微寒心經藥也養精神安魂魄辟邪魅治癲癇解諸毒祛鬼瘧硃砂稟離火之氣性反涼者高中有陰也納浮遊之火安君主之官秉陽明之德闢幽昧之邪藥中神聖也形如箭鏇透明者佳研細水飛三次用水銀辛寒有毒鎮墜痰氣上逆嘔吐反胃殺蟲墮胎下死胎水銀乃至陰之精稟沉著之性得凡火煅煉則飛騰靈變得人氣熏蒸則入骨鑽筋近巔頂則蝕腦而百節攣廢近陰莖則陰消而痿敗不興同黑鉛結砂則鎮墜痰涎同硫黃結砂則極救危病在用之者合宜爾輕粉辛溫有毒治痰涎積滯鼓脹毒瘡殺蟲搜風按輕粉乃咸礬煉水銀而成其氣燥烈其性走竄善劫痰涎消積滯故水腫風痰濕熱楊梅毒瘡服之則涎從齒齦而出邪郁暫開而愈若服之過劑及用之失宜則毒氣被逼竄入經絡筋骨莫之能出變為筋攣骨痛發為癰腫疳漏經年纍月遂成廢痼因而夭枉者不少也銀硃辛溫有毒劫痰破積殺蟲其功與輕粉同其為害亦同也廚人染食供饌未知其害耳雄黃辛溫有毒肝家藥也拽肝氣瀉肝風消涎積解百毒闢百邪殺百蟲截鬼瘧理蛇傷能化血為水石膏甘寒足陽明藥也除胃熱止陽明頭額痛日晡寒熱大渴引飲中暑潮熱胃火牙疼皮熱如火元素曰能寒胃令人不食非腹有極熱者不宜輕用東垣云邪在陽明肺受火邪故用以清肺所以有白虎之名孫兆曰四月以後天氣熱時宜用白虎壯盛人生用虛人糖拌炒恐妨脾胃火煨亦可滑石甘寒利竅除熱清三焦涼六腑化暑氣通水腫退黃疸止諸血解煩渴厚腸胃時珍曰滑石利竅不獨小便也上利毛腠之竅下利精溺之竅通上下徹表裡故主治甚多小便利及精滑者禁用赤石脂甘酸辛溫補心血生肌肉厚腸胃除水濕收脫肛好古曰澀可去脫石脂為收斂之劑赤者入丙丁白者人庚辛瀉痢初起者勿用火煅爐甘石陽明藥也受金銀之氣所生故能平肝治目清腫退赤去爛除翳火煅紅童便淬七次研粉水飛入硃砂則不黏膩海石乃水沫結成色白體輕肺之象也氣味鹹寒潤下之用也故入肺除痰嗽而軟堅上源既清故又治諸淋肝屬木當浮而反沉肺屬金當沉而反浮何也肝實而肺虛也故石入水則沉而南海有浮水之石木入水則浮而南海有沉水之香木陽起石鹹溫主下部虛寒助陽種子火煅水飛磁石色黑入腎益精明目聰耳鎮驚代赭石止反胃吐血衄血月水不止腸風瀉痢脫精遺溺小兒驚疳女人崩漏按代赭入肝與心胞專主二經血分之病仲景治汗吐下後心下硬噫氣用旋覆代赭湯取其重以鎮虛逆赤以養陰血也煅紅醋淬搗水飛砒石辛酸大熱大毒主老瘧齁喘癖積蝕瘀腐瘰癧砒本大熱大毒煉之成霜其毒尤烈人服至七八分必死得酒頃刻立斃雖緑豆冷水立難解矣入丸藥中劫哮喘痰瘧誠有立地奇功須冷水吞之不可飲食安臥一日即不作吐少物引發即作吐也惟宜生用不可經火青礞石鹹平破老痰堅積止咳嗽喘急色青乃厥陰之藥肝木乘脾土氣不運痰滯胸膈宜其重墜令木平氣下則痰症自愈脾虛家不宜多服入罐打碎礞石四兩拌勻消石四兩同煅至消盡礞石色如金為度研細水飛用花蕊石石主金瘡出血一切失血女人血暈且化血為水故雖有殊功不敢多用煅研水飛石燕利竅行濕通淋目障腸風痔瘻帶下磨汁飲之難産者兩手各握一枚即生朴硝苦辛寒一經煮煉即為芒硝鼎罐升煅即為玄明粉主五臟積聚久熱胃閉痰實血結明目下胎內經云熱淫於內治以鹹寒故承氣湯用以軟堅去實朴硝重濁止堪塗傅芒硝輕爽可供走血蕩腸之需玄明更佳然止於治病服食則不可耳硫黃咸熱有毒主命門火衰陽氣暴絶陰症傷寒陽道痿弱老人虛祕婦人血結虛人寒利心腹積聚按硫秉純陽之精益命門之火熱而不燥能潤腸結亦救危神劑故養正丹用之常收起死之功能化鉛為水修煉家尊為金液丹寇宗奭云下元虛冷真氣將絶久患泄瀉垂命欲盡服無不效但中病當便已不可盡劑番舶者良取色鮮潔者以萊蔔剜空入硫在內合好粳火煨熟去其臭氣再以紫背浮萍同煮消其火毒又以皂莢湯淘去黑漿一法絹袋盛鹼水煮三日夜取出清水漂淨用畏細辛醋諸血土硫止可入瘡科不堪服餌壬子秋余應試北雍值孝廉張抱赤久荒於色腹滿如斗參湯送金匱丸小便稍利滿亦差減越旬日而滿如故肢體厥逆仍投前丸竟無裨也舉家哀亂惟治終事抱赤泣而告曰若可救我當終其身父事之余曰即不敢保萬全然餌金液丹至數十粒尚有生理抱赤連眼百粒小便遄行滿消食進更以補中八味並進遂獲痊安故夫藥中肯綮如鼓應桴世之病是症而不得援者衆矣有如抱赤之傾信者幾何人哉況硫非治滿之劑只因元陽將絶而參附無功藉其純陽之精令陰寒之滯見暖冰消爾膽礬酸澀辛寒性斂而能上升湧吐風熱痰涎治喉痹崩淋能殺蟲治陰燭産銅坑中磨鐵如銅者真白礬酸澀性涼主消痰燥濕解毒止血定痛止痢除咽喉口齒諸病虎犬蛇蠍百蟲傷主治與膽礬同收而燥濕痰飲瀉痢崩帶風眼皆用也性能卻水多服損肺無名異甘平鹹寒治金瘡療折傷收濕氣生肌肉按無名異陽石也善理折傷內損止毒止痛故臨杖人用以溫服三錢則不甚傷亦善收水氣故煎煉桐油者不可缺也硼砂甘涼微咸退障除昏開努肉消瘕通膈殺勞蟲生津止嗽治喉痹口齒諸病按硼砂之性能柔五金而去垢膩故治𦠉膈積塊痰核努肉目翳骨哽等症但可療有餘難施於不足虛勞症中非所宜也有二種出西番者白如明礬南番者黃如桃膠能制永啞銅用藥機要醫之神良識病而已病之機要虛實而已虛甚者必寒實甚者必熱然常病易曉變病難知形衰神憊色夭脈空而知其虛形盛神鼓色澤脈強而知其實不待智者決也至實有羸狀誤補益疾大虛有盛候反瀉含冤陽狂與陰躁不同蚊迹與發斑有別自非洞燭立微者未易辨也居養有貴賤年齒有老少稟賦有厚薄受病有久新臟腑有陰陽性情有通滯運氣有盛衰時令有寒暄風氣有南北六氣之外客不齊七情之內傷匪一不能隨百病而為變通乃欲執一藥而理衆病何可得也故曰用古方治今病譬猶拆舊料改新房不再經匠氏之手其可用乎明於此者始可與言醫也矣藥有君臣佐使陶弘景以上品之藥為君及考內經曰主病之謂君佐君之謂臣應臣之謂使非上下三品之謂也張元素曰為君者最多為臣者次之佐使又次之由是而知陶為服食之説則是治病之法為偏也藥有七情獨行者單方不用輔也相須者同類不可離也相使者我之佐使也相惡者奪我能也相畏者受彼之制也相反者兩不相合也相殺者制彼之毒也相畏相反同用者霸道也相須相使同用者王道也有經有權因時勢而斟酌也藥有五味苦者入心直行而泄辛者入肺橫行而散酸者入肝束而收斂咸者入腎甘而軟堅甘者入脾有和有緩有補有瀉可上可下可內可外土味居中而能兼五行也淡之一味五臟無歸專入太陽而入小便藥有四氣溫者應春生之氣而主發育熱者應夏長之氣而主暢遂涼者應秋收之氣而主清肅寒者應冬藏之氣而主殺伐故虛弱之人不足之症當以生長為先壯實之人有餘之邪當以肅殺為要兩者易而為治是為實實虛虛損不足而益有餘如此死者醫殺之耳叔季之世人民虛薄受補者常多受克者常少故補中還少日就增多承氣抵當日漸減少奈何夫人之病十有九虛醫師之藥百無一補猶且矜獨得之妙夭枉者比比終不悔悟良可悲夫溫暖之藥象類陽明苟有過則人皆見之寒涼之藥象類陰柔小人國祚已移人猶莫覺其非凡用滋補藥病不增即是減內已受補故也用克伐藥則不減即是增內已受伐故也七方者大小緩急奇偶復大方之説有三有藥力雄猛之大有品味數多之大有分兩數多之大此治下焦療大病之法也小方之説有三有病勢輕淺不必雄猛之小有病在上焦宜分兩輕微之小有病無兼症宜君一臣二之小緩方之説有六有甘以緩之之緩有緩則治本之緩有丸以緩之之緩有品味衆多之緩有無毒治病之緩有氣味俱薄之緩急方之説有五有急症須急治之急有湯液蕩滌之急有毒藥之急有氣味俱厚之急有急則治標之急奇方之説有二有獨用一物之奇有一三五七九之奇奇方宜下不宜汗偶方之説有三有兩味配合之偶有二方合用之偶有二四六八十之偶偶方宜汗不宜下桂枝汗藥反以五味成奇承氣下藥反以四味成偶豈臨時制宜當別有法乎復方之説有三有二三方及數方相合之復本方之外復加他藥之復有分兩均齊之復王太僕以偶為復今七方有偶又有復豈非偶乃二方相合復乃數方相合乎十劑者宣通補泄輕重滑澀燥濕宣劑宣可去壅生薑橘皮之屬壅者塞也宣者布也散也鬱塞之病不升不降必宣布敷散之如氣鬱有餘則香附蕪芎以開之不足則補中益氣以運之火鬱微則山梔青黛以散之甚則升陽解肌以發之濕鬱微則蒼朮白芷以燥之甚則風藥以勝之痰鬱微則南星橘皮以化之甚則瓜蒂藜蘆以湧之血鬱微則桃仁紅花以行之甚則或吐或下以逐之食鬱微則山楂神麯以消之甚則上湧下泄以去之皆宣劑也通劑通可去滯通草防己之屬滯者留滯也濕熱留於氣分而痛痹癃閉宜淡味下降通利小便而泄氣中之滯通草是也濕熱留於血分而痛痹癃閉宜苦寒下引通其前後而泄血中之滯防己是也補劑補可去弱人參羊肉之屬形不足者補之以氣人參是也精不足者補之以味羊肉是也泄劑泄可去閉葶藶大黃之屬閉字作實字看實者瀉之葶藶瀉氣實而利小便大黃瀉血實而通大便輕劑輕可去實麻黃葛根之屬表閉者風寒傷營腠理閉密而為發熱頭痛宜麻黃輕揚之劑發其汗而表自解里閉者火熱抑鬱皮膚干閉而為煩熱昏瞀宜葛根輕揚之劑解其肌而火自散上閉有二一則外寒內熱上焦氣閉發為咽痛宜辛涼以揚散之一則飲食寒冷抑遏陽氣在下發為痞滿宜揚其清而抑其濁下實亦有二陽氣陷下裡急後重至圊不能便但升其陽而大便自順所謂下者舉之也燥熱傷肺金金氣膹郁竅閉於上而膀胱閉於下為小便不利以升麻之類探而吐之上竅通小便自利所謂病在下取之上也重劑重可去怯磁石鐵粉之屬重劑凡四有驚則氣亂魂飛者有怒則氣上發狂者並鐵粉雄黃以平其肝有神不守舍而健忘不寧者宜硃砂紫石英以鎮其心有怒則氣下而如人將捕者宜磁石沉香以安其腎滑劑滑可去著冬葵子榆白皮之屬著者有形之邪留著於經絡臟腑如屎溺濁帶痰涎胞胎癰腫之類宜滑劑以去其留滯之物此與通以去滯相類而實不同通草防己淡滲去濕熱無形之邪葵子榆皮甘滑去濕熱有形之物故彼曰滯此曰著也澀劑澀可去脫牡蠣龍骨之屬脫者氣脫血脫精脫神脫也脫則散而不收用酸澀溫平以斂其耗散夫汗出便泄遺溺皆氣脫也腸風崩下血厥皆血脫也精流骨痿精脫也牡蠣龍骨五味五棓訶子粟殼棕灰石脂皆澀藥也如氣脫加參耆血脫兼歸地精脫兼龜鹿至夫脫陽者見鬼脫陰者目盲此神脫也去死不遠無藥可治燥劑燥可去濕桑皮赤小豆之屬外感之濕由於水嵐雨露內傷之濕由於酒茶蔬果夫風藥可以勝濕淡藥可以滲濕不獨桑皮赤豆也濕劑濕可去枯白石英紫石英之屬濕字當作潤字看枯者燥也血液枯而成燥上燥則渴下燥則結筋燥則攣皮燥則揭肉燥則裂骨燥則枯養血則當歸地黃生津則門冬五味益精則蓯蓉枸杞不獨石英為潤劑也治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之高者抑之下者舉之有餘折之不足補之堅者削之客者除之勞者溫之結者散之留者行之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之又曰逆者正治從者反治反之熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使潰堅可使破積可使氣和可使必已又曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬以衰之也王太僕曰粗工褊淺學未精深以熱攻寒以寒療熱治熱未已而冷疾已生攻寒日深而熱病更起熱起而中寒尚在寒生而外熱不除欲攻寒則懼熱不前欲療熱則思寒又止豈知臟腑之源有寒熱溫涼之主哉內經曰陰味出下竅陽氣出上竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑味厚為陰味薄為陰中之陽氣厚為陽氣薄為陽中之陰味厚則泄薄則通氣薄則發泄厚則發熱辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽元素曰附子氣厚為陽中之陽大黃味厚為陰中之陰茯苓氣薄為陽中之陰所以利小便入太陽不離陽之體也麻黃味薄為陰中之陽所以發汗入手太陰不離陰之體也肝苦急急食甘以緩之甘草以酸瀉之芍藥實則瀉子甘草肝欲散急食辛以散之川芎以辛補之細辛虛則補母地黃心苦緩急食酸以收之五味以甘瀉之參耆實則瀉子甘草心欲軟急食鹹以軟之芒硝以咸補之澤瀉虛則補母生薑脾苦濕急食苦以燥之白朮以苦瀉之黃連實則瀉子桑皮脾欲緩急食甘以緩之甘草以甘補之人參虛則補母炒咸肺苦氣上逆急食苦以泄之訶子以辛瀉之桑皮實則瀉子枳實肺欲收急食酸以收之芍藥以酸補之五味虛則補母五味腎苦燥急食辛以潤之知母以咸瀉之澤瀉實則瀉子芍藥腎欲堅急食苦以堅之知母以苦補之黃柏虛則補母五味夫甘緩酸收苦燥辛散咸軟淡滲五味之本性一定而不變者也或補或瀉則因五臟四時而迭相施用者也溫涼寒熱四氣之本性也其於五臟補瀉亦迭相為用也此特潔古因素問飲食補瀉之義舉此以為例耳學者宜因其意而推廣變通之元素曰五臟更相平也一臟不平所勝平之春宜辛溫薄荷荊芥之類以順春升之氣夏宜辛熱生薑香薷之類以順夏浮之氣長夏宜甘苦辛溫人參白朮蒼朮黃柏之類以順化成之氣秋宜酸涼芍藥烏梅之類以順秋降之氣冬宜苦寒黃芩知母之類以順冬沉之氣所謂順時氣而養天和也春宜省酸增甘以養脾也夏宜省苦增辛以養肺氣長夏宜省甘增咸以養腎氣此防其太過也王好古曰四時總以芍藥為脾劑蒼朮為胃劑柴胡為時劑十一經皆取決於少陽為發生之始故也補氣用參耆氣主煦之補血須歸地血主濡之也然久病積虛雖陰血衰涸但以參耆朮草為主者經所謂無陽則無以生陰也是以氣藥有生血之功血藥無益氣之理夫氣藥甘溫法天地春生之令而發育萬物況陽氣充則脾土受培轉輸健運由是食入於胃變化精微不特灑陳於六腑而氣至抑且和調五臟而血生故曰氣藥有生血之功也血藥涼潤法天地秋肅之令而凋落萬物又且黏滯滋潤之性所以在上則泥膈而減食在下則腸滑而易泄故曰血藥無益氣之理也每見俗醫療虛熱之症往往四物主之或兼知柏芩連而投之遂使脾土受傷上嘔下泄至死不悟良可悲也藥有宜陳久者如枳實橘皮半夏麻黃吳茱萸狼毒之類藥有宜新者如人參白朮當歸澤瀉之類陳則氣味失矣何效之有詩云老醫迷舊病朽藥誤新方其斯之謂與丸散湯液當顧名思義湯者蕩也蕩滌其邪鋒丸者緩也緩養其正氣散者散也解散其結塞丸有丸法治下焦者宜大而堅中焦者次之上焦者宜小而鬆如蒸餅稀糊為丸取其易化者滴水猶為易化也如蒸飯麵糊為丸取其遲化煉蜜亦取其遲化而循行經絡也蠟丸者取其難化而治下焦之藥也凡製藥貴得中不及則無功太過則損性煅則通紅炮則煙起炒則黃而勿焦烘與焙同燥而不黃是也酒製升提咸制潤下薑取溫散醋取收斂便制減其溫蜜制潤其燥壁土取其歸中麥麩資其穀氣酥炙取其易脆去穰者寬中抽心者除煩病在上焦者先食而後藥病在下焦者先藥而後食病在上者不厭頻而少病在下者不厭頓而多少服則滋榮於上多服則峻補於下煎藥用水各有其宜中虛者當用春雨水取其生生之氣火旺者宜用冰雪水取其陰寒下降氣滯血凝痰阻便閉者宜急流水取其行而不停失血遺精溺多便滑者宜井華水用清早初汲取其凝結而不流吐逆喘嗽脹滿者宜東流水取其順下陰不升陽不降者宜甘瀾水以調之煎藥忌銅鐵器宜銀瓦器令謹慎者看守務須清潔水用新汲補藥須封固文火細煎利藥須露頂武火速煎溫服之劑宜冷服寒涼之劑宜熱服上焦藥徐徐服下焦藥宜急服凡服膏子藥噙在口俟其自化而下所謂在上不厭頻而少之意若湯調湯頓服甚非古人設膏之本旨何不隨煎隨服乃用煉火之膏耶凡煉蜜每斤加水四兩待滾掠去沫淨煎至滴水不化為度庶經久不壞藥滓再煎殊非古法味有厚薄氣有輕重若取二煎其厚且重者尚有功力其輕且薄者已無餘味安在其君臣佐使之為哉愚謂將二煎合第一煎和服庶氣味不大輕重引經報使手少陰心黃連細辛足少陰腎獨活知母肉桂細辛手太陰肺桔梗蔥白升麻白芷足太陰脾升麻葛根蒼朮白芍手厥陰心包絡柴胡丹皮足厥陰肝青皮川芎柴胡吳茱萸手太陽小腸藁本黃柏足太陽膀胱麻黃羌活手陽明大腸白芷石膏升麻足陽明胃白芷石膏升麻葛根足少陽膽柴胡青皮手少陽三焦上柴胡連翹中青皮下地骨皮附録食物性鑑賦寒涼為一例緑豆止消渴兼解諸毒豆豉治嘔逆再散風寒食醬止渴除煩而殺毒尤良豆腐散血清熱而暑月應忌脂麻發霍亂而滑腸胃小麥養心氣而止虛煩大麥有生損熟益之殊蕎麥為煉滓消積之用麩皮止汗而敷潰爛小粉調經而散癰疽麵筋益氣和中薏米健脾勝濕索粉解酒食菰菌之毒石花非虛寒腸滑所宜鮮菌有毒者時或殺人柑子多食者亦令泄瀉莧菜利大腸同鱉食而成瘕菠薐發腰痛患冷氣者莫嘗萵苣通經宣乳目疾非宜竹筍清熱消痰腸滑少食黃瓜發瘡動瘧磨菰理氣以化痰冬瓜瘦人走氣皮乾折損堪醫茄子動氣滑腸蒂灰凍瘡能療茗葉最清痰火橙子頗治酒傷甜瓜雖消暑而滑腸西瓜亦傷脾而助濕水梨利血寒中瘡毒酒毒並解柿子生痰冷腹肺火胃火都除荸薺消食解熱有功慈菰孕婦腸風多忌螃蟹解漆瘡破血蟛蜞治濕癬疽瘡蜆肉發嗽除黃蚌肉助風動冷野雞發痔瘡動痢野鴨治水腫補中螺螄清熱解酒利大小便而治痔瘡田雞骨熱肉寒治蛤蟆瘟而消水腫家鴨白補虛而黑滑利老者為良鴨卵生悶氣而醃宜人血解諸毒豬肉動風助濕鵲肉治熱療風豬腦傅凍瘡而損陽道豬脂解藥毒而滑胃腸蛤蜊醒酒開胃血塊能消田螺療熱敷瘡禁口宜用驢肉動風妊婦食之難産乳餅潤臟痢病食以尤良豬脊髓補虛損兼治諸瘡豬腰子治勞煩能通腎氣肺治肺虛咳嗽腸醫腸燥便難膽為敷瘡通便之需胰有肺痿痃癖之用牛乳潤皮膚反胃熱噦宜飲馬肉長筋骨頭瘡曰禿宜求梢瓜即生瓜成癥結而動氣時症後多妨黑魚發痼疾而生瘡療水腫卻效潤臟腑澤肌膚酥油最美添精髓益津液醍醐尤良水獺通經而理毒風兔肉解毒熱而壓丹石蘆筍清熱解諸魚蟹毒茭白髮冷除面目諸黃溫熱為一例羊肉雖補虛而發熱豬肝即明目而傷神狗肉壯陽道補胃填精鹿肉治喎邪養容強力辟惡補虛丹雞最效鼠瘻蟲毒貓肉堪醫烏雞治虛損以安胎白雞止消渴而利水瓦雀起陽道冬月食之有子豬肚補中氣四季啖以和脾山藥有健脾益腎之功南瓜乃腳氣黃疸之忌李子調中養肝而多食發熱杏實助心止渴而恣啖生痰栗子滯中氣曬乾為厚腸益腎之需桃子益顏色多食有膨脹癰疽之苦烏骨雞治勞怯崩中腎肝效著黃雌雞主添精暖氣脾胃功多薺菜發瘡癬差可滋肝黃牛肉動疫氣卻能補土白棗最損脾而助濕石榴亦病肺而生痰楊梅雖養胃兮而損筋發瘡橘子雖止渴兮而戀膈聚飲胡桃暖命門痰多積熱者勿食櫻桃動虛熱火病血嗽者休嘗川椒達下祛寒花椒溫中下氣鯽魚益胃腸補虛止痢江鱭發瘡疥助火成痰水腫便澀鮎魚雖有毒而多功去濕去痔河豚縱有效而勿食橄欖消酒毒更解河豚諸魚毒松子治諸風尤理肌膚骨節風血積丹毒海蛇最良動火生痰鮮蝦獨甚黃鱔入士厚腸多食令人霍亂鯿魚生疳助痢和芥益人肺經惟壅熱而動風氣小麥面有焉生積聚而擁諸經糯米粉甚矣扁豆和中而止泄痢黃豆壅氣而動嗽痰陳倉米沖淡最益胃家小麥曲寬中能消積滯紅曲有健脾行血之能飴糖乃動火生痰之物米醋益血酸收亦損筋而傷胃米酒通經辛散最夭命而昏神酒糟消食除冷兼成和傷止痛之勳燒酒傷膽喪心甚則黑胃腐腸而化大蒜耗血壞目兮亦能快膈化肉芥菜豁痰通肺兮惜其發痔損元寒祛嘔止和中首重生薑熟降生升消面獨推萊蔔蒔蘿除嘔逆而滋食味芫荽辟惡氣而發痘瘡金柑解酒病寬中香圓治痰氣咳嗽韭菜生散血而熟補中多則神昏目暗蔥葉治傷而根發汗過則血動氣壅獐肉祛風壯力而瘦者損人狐肉補虛暖中而頭則勿食騾肉損人孕婦尤忌白條暖胃冷瀉偏宜魚鱠發奇病而難消鰱魚動風熱而生疥龜肉止血除風更療久嗽鯇魚和中溫胃亦發諸瘡蟶腸生冷痢而治損虛淡菜療崩中而消癭氣林檎果發瘡癤冷痰胡蘿蔔利腸胃胸膈平性為一例豬血治嘈雜有蟲尾血能醫中惡豬心主驚癇恍惚心血更起痘瘡狗獾療疳積益氣補中豬獾益瘦人寬膨止痢鯉魚利水道有功過食亦令發熱青魚除濕痹最效其膽更去目翳動風瘡而發霍亂鵝肉非良解丹毒而治風痹雁肉甚美菱角鮮冷干平多則生蟯蟲而損陽道雞豆澀精理帶過則動風冷而難克化治金瘡止血痢牛血之用偏多解諸毒下死胎羊血之功最大刀豆下氣而止厄逆水斳除熱而治崩中鰣魚發疳動疾取油塗湯火之傷勒魚開胃和中作鯗尤調脾之味絲瓜發痘瘡血壅熱者宜也壺盧治黃腫腳氣虛脹者忌之烏鴉煅過可療急風鴿肉食多能減藥力白果益氣發脹足供白濁蝨蟲之用枇杷止吐潤臟亦有傷脾發熱之嫌解渴收痔泥鰍反有奇功發病動風鱘蟥切宜少食赤豆逐津液而治産難久則肌枯膚燥黑豆解百毒而除水脹能令血活風消白魚開胃消水惜生痰而發瘡石首止痢厚腸魫治淋而解毒蠶豆利臟腑誤吞針而可下豇豆補腎水鼠奔毒以能消木耳發風動疾桑槐生者差良香菌破血治風楓桐産者尤美魚鰾療折傷而出肉刺魚鮓損脾胃而發疥瘡棐子止濁療嗽殺蟲膨有良功龍眼長智安神補心脾為上品龜肉虛損濕邪者堪食鱉肉癥瘕冷疾者非宜調中補胃榛子之甘平衄血口乾荔枝之酸熱雞肉催食安神腸治濁而腎治齆雞子動風短氣白性寒而黃性溫梅子損齒蝕脾大棗助疳滋濕鯧魚益氣力令人肥健鱸魚發痃癖卻可安胎豌豆補脾澤面惟氣病其勿嘗索粉解毒通經但膠黏而寒胃銀魚寬中健胃鰻魚殺蟲去風芋艿困脾而滯氣粳醫蛛蜘蜂蠆之傷百合止嗽而固金即理傷寒百合之病鮮藕散血而兼理折傷除煩止熱蓮子補脾而更入心腎開胃厚腸灰藋殺蟲擦癬而療風蔗槳解渴和中而醒酒諸物有毒解諸物毒合為一例果忽異常根下必藏毒物核如未脫仁雙並可傷人或果落地而蟲喙或瓜沉水而雙蒂指六翼四距四足三皆禽中之最毒角獨尾歧肝青足赤悉獸肉之非良飛者死而目閉足踡走者死而口張首北死疔死箭異色異形下咽便能隕命鳥白首玄鳥玄首白舉七即爾腐腸心損心而肝損肝腦滑精而血敗血或死緣瘡疫或身戴龍形或心肝有孔而著草欲飛或落水不浮而久烹不爛是皆發毒生癰保生當戒至若脯沾屋漏犬有懸蹄牛羊身黑而白頭鹽醋久醃而不變黑班昂首四目無腮鰻中之刀刃獨目腹文頭伸足赤鱉類之砒鴆肉中若有米星日曬久難乾燥夜照身浮水面者其鱔決從蛇化腹毛獨目足班者此蟹必令人亡烹既爛而水如初殺已久而血不斷經宵方煮著塵不沾猘犬馬肝餒魚敗肉尤宜慎之庶免傷殘若夫毒性設傷良方宜急豆豉頭垢能消六畜之幾危大豆鹽湯可治箭傷之肉毒杏仁糜狗甘草化羊牛馬生疔甘菊澤蘭根服解過傷諸肉芫荽生韭汁嘗消人乳制獨肝之牛豬骨化馬肝之毒螃蟹遇蒜汁紫蘇而害弭河豚得橄欖荊芥而毒消馬肉病者美酒蘆根豬肉病者朴硝韭汁索粉傷還須杏校鮮菌毒必飲地漿此特大端尚俟縷舉
